version: '3.7'

volumes:
  btc_server:
    driver: local
  reth:
    driver: local

services:
  btc_server:
    image: btc_server:latest
    build:
      context: .
      dockerfile: Dockerfile.btc_server
    pull_policy: always
    container_name: btc_server
    ports:
      - '8080:8080'
    volumes:
      - btc_server:/app

  node:
    image: botanix_testnet:latest
    build:
      context: .
      dockerfile: Dockerfile.testnet
    pull_policy: always
    container_name: node
    command:
      [
        '/usr/local/bin/reth',
        'node',
        '--chain',
        'botanix_testnet',
        '--datadir',
        '/reth/botanix_testnet',
        '--http',
        '--http.corsdomain',
        '*',
        '--http.port',
        '8545',
        '--http.addr',
        '0.0.0.0',
        '--http.api',
        'admin,debug,eth,net,trace,txpool,web3,rpc',
        '-vvv',
        '--auto-mine',
        '--disable-discovery',
        '--btc-server',
        'btc_server:8080',
        '--btc-block-source',
        'https://mempool.space/signet/api',
      ]
    ports:
      - '30303:30303'
      - '9001:9001'
      - '8545:8545'
      - '8546:8546'
    volumes:
      - reth:/reth/botanix_testnet/db
    depends_on:
      - btc_server
