# general settings
namespace: botanix-local
clusterBaseUrl: svc.cluster.local

docker:
  registry: registry.dev.svc.cluster.local:5000

ingress:
  enabled: true
roles:
  create: true

serviceAccount: local-botanix-serviceaccount

kibanaDomain: local-kibana.botanix.com
dashboardDomain: local-dashboard.botanix.com

disableResourceLimits: true
waitForServiceDependencies: false

# pvc
botanixSharedMnt:
  accessModes:
    value: "ReadWriteMany"
  storageClassName:
    enabled: false
    value: "aws-efs"
  enableHostPath: false
  type: DirectoryOrCreate
  hostPath: "/tmp/botanix-shared-mount"

# Only start absolutely required jobs
onlyRequiredBaseServices: false

# service settings
testnet:
  enabled: false
  image: "testnet"
  tag: "latest"
  configFilesFolders: {}

btcServer:
  enabled: false
  image: "btcserver"
  tag: "latest"
  configFilesFolders: {}

dashboard:
  enabled: false
  image: "dashboard"
  tag: "latest"
  configFilesFolders: {}

mongo:
  enabled: false

sidecar:
  enabled: false
  image: "sidecar"
  tag: "latest"
  configFilesFolders: {}

grafana:
  image: "grafana/grafana"
  tag: "7.2.1"

prometheus:
  image: "prom/prometheus"
  tag: "v2.22.0"

elasticsearch:
  enabled: false
  storage: "100Mi"
  image: "docker.elastic.co/elasticsearch/elasticsearch"
  tag: "7.10.2"
  configFilesFolders: {}

monitoring:
  enabled: false
  configFilesFolders: {}

kibana:
  enabled: false

# Resource profiles for all containers.
# This allows to easily override requests and limits via additional values file.
resourceProfile:
  testnet:
    requests:
      cpu: 0.05
      memory: 300Mi
    limits:
      cpu: 0.3
      memory: 600Mi
  btcServer:
    requests:
      cpu: 0.05
      memory: 300Mi
    limits:
      cpu: 0.3
      memory: 600Mi
  dashboard:
    requests:
      cpu: 0.05
      memory: 100Mi
    limits:
      cpu: 0.3
      memory: 500Mi
  grafana:
    requests:
      cpu: 0.05
      memory: 10Mi
    limits:
      cpu: 1
      memory: 500Mi
  prometheus:
    requests:
      cpu: 0.05
      memory: 10Mi
    limits:
      cpu: 1
      memory: 500Mi
  elasticsearch:
    requests:
      cpu: 0.05
      memory: 500Mi
    limits:
      cpu: 0.5
      memory: 2Gi
  kibana:
    requests:
      cpu: 0.05
      memory: 400Mi
    limits:
      cpu: 0.2
      memory: 700Mi
  mongo:
    requests:
      storage: 1Gi
