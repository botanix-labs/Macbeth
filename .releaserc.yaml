---
# Configuration for semantic-release

# Branch configuration
branches:
  # main branch for production releases
  - name: main
    channel: latest
  # develop branch for alpha pre-releases
  - name: develop
    channel: alpha
    prerelease: alpha
  # rc branch for release candidates
  - name: rc
    channel: rc
    prerelease: rc
  # hotfix branch for urgent fixes
  - name: hotfix
    channel: hotfix
    prerelease: hotfix

# Format for git tags
tagFormat: v${version}

# Plugins that control the release process
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: docs
          release: patch
        - type: style
          release: patch
        - type: refactor
          release: patch
        - type: test
          release: patch
        - type: build
          release: patch
        - type: ci
          release: patch
        - type: chore
          scope: release
          release: false
        - type: chore
          release: patch
        - breaking: true
          release: major

  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
      presetConfig:
        types:
          - type: feat
            section: Features
          - type: fix
            section: Bug Fixes
          - type: perf
            section: Performance Improvements
          - type: refactor
            section: Code Refactoring
          - type: docs
            section: Documentation
          - type: test
            section: Tests
          - type: build
            section: Build System
          - type: ci
            section: Continuous Integration
          - type: chore
            section: Miscellaneous
          - type: style
            section: Miscellaneous

  # Update version in Cargo.toml and prepare for release
  - - "@semantic-release/exec"
    - prepareCmd: |
        .github/scripts/release.sh update ${nextRelease.version}
      successCmd: |
        git push origin HEAD:${branch.name} --tags

        # Handle back-merging for main branch releases
        if [ "${branch.name}" = "main" ]; then
          echo "Performing back-merge from main to develop, rc, and hotfix branches"
          git fetch origin
          .github/scripts/release.sh multi_back_merge main "${process.env.GITHUB_TOKEN}" develop rc hotfix
        fi


  # Build Docker images with channel-specific tags
  - - "@semantic-release/exec"
    - publishCmd: |
        # Determine Docker tags based on release channel
        if [ "${branch.channel}" = "latest" ]; then
          # Main branch - stable release tags
          DOCKER_TAGS="latest,{{version}},{{major}}.{{minor}},{{major}}"
        elif [ "${branch.channel}" = "alpha" ]; then
          # Develop branch - alpha channel tags
          DOCKER_TAGS="alpha,alpha-latest,{{version}}"
        elif [ "${branch.channel}" = "rc" ]; then
          # RC branch - release candidate tags
          DOCKER_TAGS="rc,rc-latest,{{version}}"
        elif [ "${branch.channel}" = "hotfix" ]; then
          # Hotfix branch - hotfix channel tags
          DOCKER_TAGS="hotfix,hotfix-latest,{{version}}"
        else
          # Fallback for other channels
          DOCKER_TAGS="{{channel}},{{channel}}-latest,{{version}}"
        fi

        echo "Building Docker images with tags: $DOCKER_TAGS"

        # Build and push BTC Server image
        docker buildx build \
          --platform linux/amd64 \
          --build-arg PACKAGE=btc-server \
          --build-arg BIN=btc-server \
          --label org.opencontainers.image.version={{version}} \
          --label org.opencontainers.image.created={{date}} \
          --label org.opencontainers.image.revision={{hash}} \
          --label org.opencontainers.image.source=https://github.com/${process.env.GITHUB_REPOSITORY} \
          --label org.opencontainers.image.channel=${branch.channel} \
          $(echo "$DOCKER_TAGS" | tr ',' '\n' | sed 's/^/-t ghcr.io\/botanix-labs\/macbeth\/botanix-btc-server:/' | tr '\n' ' ') \
          --push \
          -f Dockerfile .

        # Build and push Reth Node image  
        docker buildx build \
          --platform linux/amd64 \
          --build-arg PACKAGE=reth \
          --build-arg BIN=reth \
          --label org.opencontainers.image.version={{version}} \
          --label org.opencontainers.image.created={{date}} \
          --label org.opencontainers.image.revision={{hash}} \
          --label org.opencontainers.image.source=https://github.com/${process.env.GITHUB_REPOSITORY} \
          --label org.opencontainers.image.channel=${branch.channel} \
          $(echo "$DOCKER_TAGS" | tr ',' '\n' | sed 's/^/-t ghcr.io\/botanix-labs\/macbeth\/botanix-reth-node:/' | tr '\n' ' ') \
          --push \
          -f Dockerfile .

