[package]
name = "reth-btc-wallet"
# not using workspace so btc-server dockerfile runs correctly
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
license = "MIT OR Apache-2.0"
repository = "https://github.com/paradigmxyz/reth"
exclude = [".github/"]

[dependencies]
anyhow = "1.0.71"
bitcoin = {version = "0.30.1", features = ["serde", "rand"]}
secp256k1 = { version = "0.27.0", features = ["rand", "rand-std"]}
rand = { version = "0.6", features = ["std"] }
miniscript = "10.0.0"
hex = "0.4.3"
lazy_static = "1.4.0"
reqwest = { version = "0.11.18", features = ["blocking", "json"] }
async-trait = "0.1.73"
ethers = "2.0.10"
thiserror = "1.0.43"


[features]
# Included solely to ignore certain tests.
optimism = []