[package]
name = "reth-authority-consensus"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
exclude.workspace = true
description = "A PoA consensus engine"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# reth
reth-consensus-common = { path = "../common" }
reth-beacon-consensus = { path = "../beacon" }
reth-primitives.workspace = true
reth-interfaces.workspace = true
reth-provider.workspace = true
reth-stages = { path = "../../stages" }
reth-revm = { path = "../../revm" }
reth-transaction-pool.workspace = true
# reth-beacon-imports
reth-db = { path = "../../storage/db" }
reth-tasks.workspace = true
reth-rpc-types.workspace = true
reth-network = { path = "../../net/network", features = ["serde"] }
reth-eth-wire = { path = "../../net/eth-wire" }

ruint = { version = "1.9.0", features = ["primitive-types", "rlp"] }

# async
futures-util.workspace = true
tokio = { workspace = true, features = ["sync", "time"] }
tokio-stream.workspace = true
tracing.workspace = true

## Botanix
reth-botanix-lib.workspace = true
reth-btc-wallet.workspace = true
btc-server = { path = "../../../bin/btc-server" }
client = {path = "../../../bin/btc-server/client"}

## Bitcoin
bitcoin = "0.30.0"

## Crypto
secp256k1 = { version = "0.27.0", default-features = false, features = ["global-context", "rand-std", "recovery"] }

### Grpc
tonic = "0.9.2"

## url
url = "2.2"

## this error
thiserror.workspace = true

[dev-dependencies]
reth-interfaces = { workspace = true, features = ["test-utils"] }
