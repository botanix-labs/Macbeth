[package]
name = "reth-authority-consensus"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
exclude.workspace = true
description = "A PoA consensus engine"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# reth
reth-consensus-common = { path = "../common" }
reth-beacon-consensus = { path = "../beacon" }
reth-primitives.workspace = true
reth-interfaces.workspace = true
reth-provider.workspace = true
reth-stages = { path = "../../stages" }
reth-revm = { path = "../../revm" }
reth-payload-builder.workspace = true
# reth-beacon-imports
reth-tasks.workspace = true
reth-rpc-types.workspace = true
reth-network = { path = "../../net/network", features = ["serde"] }
reth-node-ethereum.workspace = true
reth-eth-wire = { path = "../../net/eth-wire" }
reth-node-api.workspace = true
serde_json = { workspace = true }

ruint = { version = "1.9.0", features = ["primitive-types", "rlp"] }

# async
futures-util.workspace = true
tokio = { workspace = true, features = ["sync", "time"] }
tokio-stream.workspace = true
tracing.workspace = true

## Botanix
reth-botanix-lib.workspace = true
reth-btc-wallet.workspace = true
btc-server = { path = "../../../bin/btc-server" }
client = {path = "../../../bin/btc-server/client"}

## Ethereum
ethers = "2.0.11"

# hex
hex = "0.4.3"

# frost
# TODO update this to the zcash frost library when tr is merged in
frost-secp256k1-tr = { git = "https://github.com/mimoo/frost", branch = "mimoo/fix5",  features = ["serde", "serialization"] }

## Bitcoin
bitcoin = "0.30.2"

## Crypto
secp256k1 = { workspace = true, features = [
    "global-context",
    "rand-std",
    "recovery",
] }

### Grpc
tonic = "0.9.2"

## url
url = "2.2"

## this error
thiserror.workspace = true

[dev-dependencies]
reth-interfaces = { workspace = true, features = ["test-utils"] }
reth.workspace = true
tempfile.workspace = true
clap.workspace = true
jsonrpsee.workspace = true
eyre.workspace = true
serde_json.workspace = true

ethers = "2.0.13"

[features]
# Included solely to ignore certain tests.
optimism = []