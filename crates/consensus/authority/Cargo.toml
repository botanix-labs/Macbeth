[package]
name = "reth-authority-consensus"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
exclude = { workspace = true }
description = "A PoA consensus engine"

[dependencies]

# compression
async-compression = { version = "0.4.11", features = ["all"] }

# ser/deser
bincode = "1.3.3"

## Bitcoin
bitcoin = { workspace = true }
bitcoin_hashes = "0.13.0"
btc-server = { path = "../../../bin/btc-server" }

# bytes
bytes = "1.6.0"
client = { path = "../../../bin/btc-server/client" }

# CometBFT
comet-bft-rpc = { workspace = true }

# displaydoc
displaydoc = "0.2"

# ethabi
ethabi = "18.0.0"

# frost
frost-secp256k1-tr = { git = "https://github.com/0xBEEFCAF3/frost", branch = "additional-tweaks", features = [
    "serde",
    "serialization",
] }

# async
futures-util = { workspace = true }

# hex
hex = "0.4.3"

# paste
paste = "1.0.15"
postcard = "1.0.8"

# prost
prost = "0.13.3"
reth-basic-payload-builder = { workspace = true }
reth-beacon-consensus = { path = "../beacon" }
reth-blockchain-tree = { workspace = true }
reth-blockchain-tree-api = { workspace = true }

## Botanix
reth-btc-wallet = { workspace = true }
reth-chainspec = { workspace = true }
# reth
reth-cli-runner = { workspace = true }
reth-consensus = { workspace = true }
reth-consensus-common = { path = "../common" }

reth-db = { workspace = true }
reth-db-common = { workspace = true }
reth-ethereum-consensus = { workspace = true }
reth-ethereum-payload-builder = { workspace = true }
reth-evm = { workspace = true }
reth-evm-ethereum = { workspace = true }
reth-execution-errors = { workspace = true }
reth-network = { path = "../../net/network", features = ["serde"] }
reth-network-api = { workspace = true }
reth-network-p2p = { workspace = true }
reth-network-peers = { workspace = true, features = ["secp256k1"] }
reth-node-api = { workspace = true }
reth-node-core = { workspace = true }
reth-node-ethereum = { workspace = true }
reth-payload-builder = { workspace = true }
reth-primitives = { workspace = true, features = ["secp256k1"] }
reth-provider = { workspace = true, features = ["test-utils"] }
reth-revm = { workspace = true }
reth-rpc-types = { workspace = true }
reth-tasks = { workspace = true }
reth-transaction-pool = { workspace = true, features = ["test-utils"] }

# LRU Cache
schnellru = { workspace = true }

## Crypto
secp256k1 = { workspace = true, features = ["global-context", "rand-std", "recovery"] }
serde = { version = "1.0", features = ["derive"] }

serde_json = { workspace = true }
strum = { version = "0.26.3", features = ["derive"] }
strum_macros = "0.26.4"
tempfile = { workspace = true }

# Tendermint
tendermint-abci = { workspace = true }
tendermint-light-client = { workspace = true }
tendermint-proto = { workspace = true }

## thiserror
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }

### Grpc
tonic = "0.12.3"
tracing = { workspace = true }

# uuid
uuid = { version = "1.8.0", features = ["v4"] }

[dev-dependencies]

rand = "0.8.5"
reth-evm = { workspace = true, features = ["test-utils"] }
