[package]
name = "reth-authority-consensus"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
exclude = { workspace = true }
description = "A PoA consensus engine"

[dependencies]
alloy-rpc-types-engine = { version = "0.2.1", default-features = false }
async-trait = { workspace = true }
botanix-storage = { workspace = true }

## Bitcoin
bitcoin = { workspace = true }
botanix-authority-edh = { workspace = true }

## Botanix
botanix-authority-metrics = { workspace = true }
botanix-authority-peg = { workspace = true, features = ["secp256k1"] }
botanix-authority-rsp = { workspace = true }
botanix-bitcoin-checkpoint = { workspace = true }
botanix-btc-wallet = { workspace = true }
botanix-comet-bft-rpc = { workspace = true }
botanix-data-parser = { workspace = true }
btc-server = { path = "../../../bin/btc-server" }

# others
bytes = "1.6.0"
client = { path = "../../../bin/btc-server/client" }
displaydoc = "0.2"
ethabi = "18.0.0"

# frost
frost-secp256k1-tr = { workspace = true }
futures = { workspace = true }
# async
futures-util = { workspace = true }

hex = "0.4.3"

# lazy
once_cell = { workspace = true }
prost = "0.13.3"
reth-basic-payload-builder = { workspace = true }

# reth
reth-chain-state = { workspace = true }
reth-chainspec = { workspace = true }
reth-consensus = { workspace = true }
reth-consensus-common = { path = "../common" }
reth-db = { workspace = true }
reth-ethereum-consensus = { workspace = true }
reth-ethereum-payload-builder = { workspace = true }
reth-evm = { workspace = true }
reth-evm-ethereum = { workspace = true }
reth-execution-errors = { workspace = true }
reth-network = { path = "../../net/network", features = ["serde"] }
reth-network-peers = { workspace = true, features = ["secp256k1"] }
reth-node-core = { workspace = true }
reth-node-ethereum = { workspace = true }
reth-payload-builder = { workspace = true }
reth-primitives = { workspace = true, features = ["secp256k1"] }
reth-provider = { workspace = true, features = ["test-utils", "serde"] }
reth-revm = { workspace = true }
reth-rpc-types = { workspace = true }
reth-tasks = { workspace = true }
reth-transaction-pool = { workspace = true, features = ["test-utils"] }
reth-trie = { workspace = true }
reth-trie-db = { workspace = true }

# LRU Cache
schnellru = { workspace = true }

## Crypto
secp256k1 = { workspace = true, features = ["global-context", "rand-std", "recovery"] }

serde_json = { workspace = true }
tendermint = { version = "0.40.1", features = ["clock"] }

# Tendermint
tendermint-abci = { workspace = true }
tendermint-proto = { workspace = true }
tendermint-rpc = { workspace = true }

## thiserror
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }

### Grpc
tonic = "0.12.3"
tracing = { workspace = true }

# uuid
uuid = { version = "1.8.0", features = ["v4"] }

[dev-dependencies]
botanix-storage = { workspace = true, features = ["test-utils"] }
rand = "0.8.5"
reth-cli-runner = { workspace = true }
reth-db-common = { workspace = true }
reth-evm = { workspace = true, features = ["test-utils"] }
tempfile = { workspace = true }
