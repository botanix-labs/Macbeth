revm = { workspace = true }

serde = { workspace = true, optional = true }

[dev-dependencies]
alloy-eips = { workspace = true }
alloy-primitives = { workspace = true }
reth-primitives = { workspace = true, features = ["test-utils", "secp256k1"] }

[features]
default = ["std"]
serde = ["dep:serde", "reth-trie/serde", "revm/serde"]
std = []
