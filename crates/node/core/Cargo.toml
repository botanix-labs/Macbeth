[package]
name = "reth-node-core"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[dependencies]

# ethereum
alloy-genesis = { workspace = true }

# askama
askama = "0.12.1"

# bitcoin
bitcoin = { workspace = true }
botanix-authority-edh = { workspace = true }
botanix-cli-args = { workspace = true }
# botanix-btc-wallet = { workspace = true }
botanix-cli-parsers = { workspace = true }

# Botanix
btc-server-client = { path = "../../../bin/btc-server/client" }
clap = { workspace = true, features = ["derive", "env"] }
const_format = { workspace = true }
derive_more = { workspace = true }

# io
dirs-next = "2.0.0"

# misc
eyre = { workspace = true }

# async
futures = { workspace = true }

# hex
hex = "0.4.3"
humantime = { workspace = true }

rand = { workspace = true }

# reth
reth-chainspec = { workspace = true }
reth-cli-util = { workspace = true }
reth-config = { workspace = true }
reth-consensus-common = { workspace = true }
reth-db = { workspace = true, features = ["mdbx"] }
reth-db-api = { workspace = true }
reth-discv4 = { workspace = true }
reth-discv5 = { workspace = true }
reth-fs-util = { workspace = true }
reth-net-nat = { workspace = true }
reth-network = { workspace = true, features = ["serde"] }
reth-network-p2p = { workspace = true }
reth-network-peers = { workspace = true }
reth-primitives = { workspace = true }
reth-provider = { workspace = true }
reth-prune-types = { workspace = true }
reth-rpc-api = { workspace = true, features = ["client"] }
reth-rpc-eth-api = { workspace = true, features = ["client"] }
reth-rpc-eth-types = { workspace = true }
reth-rpc-server-types = { workspace = true }
reth-rpc-types = { workspace = true }
reth-rpc-types-compat = { workspace = true }
reth-stages-types = { workspace = true }
reth-storage-errors = { workspace = true }
reth-tracing = { workspace = true }
reth-transaction-pool = { workspace = true }

# crypto
secp256k1 = { workspace = true, features = ["global-context", "rand-std", "recovery"] }
serde = { workspace = true }
serde_json = { workspace = true }
shellexpand = { workspace = true }
toml = { workspace = true }

# tracing
tracing = { workspace = true }

## url
url = "2.2"

[dev-dependencies]
assert_matches = { workspace = true }
# test vectors generation
proptest = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }

[features]
# Features for vergen to generate correct env vars
jemalloc = []
asm-keccak = []

[build-dependencies]
vergen = { version = "8.0.0", features = ["build", "cargo", "git", "gitcl"] }
