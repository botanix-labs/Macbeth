[package]
name = "reth-rpc-eth-types"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
description = "Types supporting implementation of 'eth' namespace RPC server API"

[lints]
workspace = true

[dependencies]

# ethereum
alloy-sol-types = { workspace = true }

# Bitcoin
bitcoin = { workspace = true }
bitcoincore-rpc = { workspace = true }

# Bitcoin signing server
btc-server = { path = "../../../bin/btc-server" }

derive_more = { workspace = true }

# FROST dependencies
frost-secp256k1-tr = { workspace = true }

# async
futures = { workspace = true }

# rpc
jsonrpsee-core = { workspace = true }
jsonrpsee-types = { workspace = true }

# metrics
metrics = { workspace = true }
rand = { workspace = true }
reth-btc-wallet = { workspace = true }
reth-chain-state = { workspace = true }
reth-chainspec = { workspace = true }
reth-errors = { workspace = true }
reth-evm = { workspace = true }
reth-execution-types = { workspace = true }
reth-metrics = { workspace = true }
reth-primitives = { workspace = true, features = ["secp256k1"] }
reth-revm = { workspace = true }
reth-rpc-server-types = { workspace = true }
reth-rpc-types = { workspace = true }
reth-rpc-types-compat = { workspace = true }
reth-storage-api = { workspace = true }
reth-tasks = { workspace = true }
reth-transaction-pool = { workspace = true }
reth-trie = { workspace = true }
revm = { workspace = true }
revm-inspectors = { workspace = true }
revm-primitives = { workspace = true, features = ["dev"] }
schnellru = { workspace = true }
secp256k1 = { workspace = true }

# misc
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tracing = { workspace = true }

# url
url = "2.2"
[dev-dependencies]
serde_json = { workspace = true }

[features]
js-tracer = ["revm-inspectors/js-tracer"]
