[package]
name = "reth-revm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "reth specific revm utilities"

[dependencies]
# reth
reth-primitives.workspace = true
reth-interfaces.workspace = true
reth-provider.workspace = true
reth-revm-primitives = { path = "./revm-primitives" }
reth-revm-inspectors = { path = "./revm-inspectors" }
reth-consensus-common = { path = "../consensus/common" }
reth-tasks = { path = "../tasks" }
lazy_static = "*"

# revm
revm.workspace = true

# Botanix
btc-wallet = { path = "../../../btc-wallet" }
botanix-lib = { path = "../../../botanix-lib" }

# Secp256k1
secp256k1 = { version = "0.27.0", default-features = false, features = ["global-context", "rand-std", "recovery"] }

# common
tracing.workspace = true

# Bitcoin
bitcoin = "0.30.1"
