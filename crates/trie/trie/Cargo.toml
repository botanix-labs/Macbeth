[package]
name = "reth-trie"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
description = "Merkle trie implementation"

[lints]
workspace = true

[dependencies]

# alloy
alloy-rlp = { workspace = true }
auto_impl = { workspace = true }
itertools = { workspace = true }
metrics = { workspace = true, optional = true }

# misc
rayon = { workspace = true }
# reth
reth-execution-errors = { workspace = true }

# `metrics` feature
reth-metrics = { workspace = true, optional = true }
reth-primitives = { workspace = true }
reth-stages-types = { workspace = true }
reth-storage-errors = { workspace = true }
reth-trie-common = { workspace = true }

revm = { workspace = true }

# `serde` feature
serde = { workspace = true, optional = true }

# tracing
tracing = { workspace = true }

# `test-utils` feature
triehash = { version = "0.8", optional = true }

[dev-dependencies]
criterion = { workspace = true }

# misc
proptest = { workspace = true }
proptest-arbitrary-interop = { workspace = true }
# reth
reth-chainspec = { workspace = true }
reth-primitives = { workspace = true, features = ["test-utils", "arbitrary"] }
reth-provider = { workspace = true, features = ["test-utils"] }
reth-trie-common = { workspace = true, features = ["test-utils", "arbitrary"] }
serde_json = { workspace = true }
similar-asserts = { workspace = true }
tokio = { workspace = true, default-features = false, features = ["sync", "rt", "macros"] }
tokio-stream = { workspace = true }

# trie
triehash = "0.8"

[features]
metrics = ["reth-metrics", "dep:metrics"]
serde = ["dep:serde"]
test-utils = ["triehash", "reth-trie-common/test-utils"]

[[bench]]
name = "prefix_set"
harness = false

[[bench]]
name = "hash_post_state"
harness = false

[[bench]]
name = "trie_root"
required-features = ["test-utils"]
harness = false
