[package]
name = "reth-trie-db"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
description = "Database integration with merkle trie implementation"

[lints]
workspace = true

[dependencies]

# alloy
alloy-rlp = { workspace = true }
derive_more = { workspace = true }
metrics = { workspace = true, optional = true }
reth-db = { workspace = true }
reth-db-api = { workspace = true }
reth-execution-errors = { workspace = true }
reth-metrics = { workspace = true, optional = true }
# reth
reth-primitives = { workspace = true }
reth-storage-errors = { workspace = true }
reth-trie = { workspace = true }
reth-trie-common = { workspace = true }

revm = { workspace = true }

# `serde` feature
serde = { workspace = true, optional = true }

# tracing
tracing = { workspace = true }

# `test-utils` feature
triehash = { version = "0.8", optional = true }

[dev-dependencies]
criterion = { workspace = true }

# misc
proptest = { workspace = true }
proptest-arbitrary-interop = { workspace = true }
# reth
reth-chainspec = { workspace = true }
reth-db = { workspace = true, features = ["test-utils"] }
reth-primitives = { workspace = true, features = ["test-utils", "arbitrary"] }
reth-provider = { workspace = true, features = ["test-utils"] }
reth-storage-errors = { workspace = true }
reth-trie = { workspace = true, features = ["test-utils"] }
reth-trie-common = { workspace = true, features = ["test-utils", "arbitrary"] }
serde_json = { workspace = true }
similar-asserts = { workspace = true }
tokio = { workspace = true, default-features = false, features = ["sync", "rt", "macros"] }
tokio-stream = { workspace = true }

# trie
triehash = "0.8"

[features]
metrics = ["reth-metrics", "reth-trie/metrics", "dep:metrics"]
serde = ["dep:serde"]
test-utils = ["triehash", "reth-trie-common/test-utils"]
