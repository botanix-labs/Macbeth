[package]
name = "pegin-recovery"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[lib]
name = "peginrecoverylib"

[[bin]]
name = "pegin-recovery"
path = "src/bin/main.rs"

[dependencies]
anyhow = "1.0.75"
log = "0.4.18"
env_logger = "0.11.3"

# CLI argument parsing
clap = { version = "4.5", features = ["derive", "env"] }

# Bitcoin related dependencies
bitcoin = { version = "0.32.5", features = ["base64", "rand", "serde"] }
btc-server = { path = "../btc-server" }
frost-secp256k1-tr = { git = "https://github.com/botanix-labs/frost", rev = "b4c5ab017bb0d182f3c56fd80b95d6375a4bfeea", features = [
    "serde",
    "serialization",
] }
miniscript = "12.3.0"
rand = "0.8.5"
hex = "0.4.3"
serde = "1.0.171"
serde_json = "1.0"

# Database dependencies
sled = "0.34.7"
ciborium = "0.2.1"
chacha20poly1305 = "0.10.1"
merlin = "3.0.0"
zeroize = "1.8.1"
thiserror = "2.0.11"

# gRPC/protobuf
prost = "0.13.3"
prost-types = "0.13.5"
tokio = { version = "1.45.0", features = ["full"] }
tokio-stream = "0.1"
tonic = { version = "0.12.3", features = ["gzip"] }
tonic-health = { version = "0.12.3" }
tonic-reflection = { version = "0.12.3" }

[build-dependencies]
prost-build = "0.13.3"
tonic-build = "0.12.3"

[dev-dependencies]
tempfile = "3.6.0"
