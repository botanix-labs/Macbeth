[package]
name = "test-suite"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "test-suite"
path = "src/bin/test-suite.rs"

[dependencies]
ansi_term = "0.12.1"
anyhow = "1.0.71"
argh = "0.1.10"

# crates.io dependencies
askama = "0.12.1"

assert_matches = { workspace = true }
async-trait = "0.1.68"
base64 = "0.22.1"
bitcoin = { workspace = true }
bitcoin_hashes = "0.16.0"

## Bitcoin rpc
bitcoincore-rpc = { workspace = true }
botanix-authority-edh = { workspace = true }
botanix-authority-peg = { workspace = true, features = ["secp256k1"] }

# Botanix
botanix-btc-wallet = { path = "../../crates/botanix-btc-wallet" }
botanix-cli-args = { workspace = true }
botanix-comet-bft-rpc = { workspace = true }
botanix-configs = { workspace = true }
botanix-data-parser = { workspace = true }
botanix-storage = { workspace = true }
botanix-wallet-sweep = { workspace = true }
btc-server = { path = "../btc-server" }

# other dependencies
bytes = "1.4.0"
clap = "4.3.3"
btc-server-client = { path = "../btc-server/client" }
displaydoc = "0.2.4"
dotenv = { version = "0.15.0" }

## Ethereum
ethers = { version = "2.0.14", features = ["ws"] }

eyre = { workspace = true }

# frost
frost-secp256k1-tr = { workspace = true }
futures = { workspace = true }

hex = "0.4.3"
port-killer = "0.1.0"
rand = "0.8.5"
regex = "1.11.1"
reth = { workspace = true }
reth-authority-consensus = { workspace = true }
reth-chainspec = { workspace = true }
reth-cli-commands = { workspace = true }
reth-cli-runner = { workspace = true }
reth-consensus = { workspace = true }
reth-db = { workspace = true, features = ["mdbx"] }
reth-network-peers = { workspace = true }
reth-node-core = { workspace = true }
reth-primitives = { workspace = true, features = ["secp256k1"] }
reth-provider = { workspace = true }
reth-rpc-types = { workspace = true }
reth-tracing = { workspace = true }

## Crypto
secp256k1 = { workspace = true, features = ["global-context", "rand-std", "recovery"] }
serde = { version = "1.0.164", features = ["derive"] }
serde_json = "1.0.96"
strum = { version = "0.25.0", features = ["derive"] }
strum_macros = "0.25.0"
tempfile = { workspace = true }
tendermint-rpc = { workspace = true }
thiserror = "2.0.11"
tokio = { version = "1.45.0", features = ["full"] }
toml = "0.8.0"
tonic = { version = "0.12.3", features = ["gzip"] }
tracing = { workspace = true }
url = "2.3.1"
uuid = { version = "1.3.3", features = ["serde", "v4"] }

[dev-dependencies]
pretty_assertions = "1.3.0"

[build-dependencies]
ethers = "2.0.14"

[features]
default = ["tests"]
tests = []
