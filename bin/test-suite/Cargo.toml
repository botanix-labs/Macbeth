[package]
name = "test-suite"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "test-suite"
path = "src/bin/test-suite.rs"

[dependencies]

eyre.workspace = true
reth-interfaces = { workspace = true, features = ["test-utils"] }
reth.workspace = true
reth-primitives.workspace = true
reth-provider.workspace = true
reth-rpc-types.workspace = true
reth-node-core.workspace = true
reth-authority-consensus.workspace = true
reth-botanix-lib.workspace = true

## Ethereum
ethers = "2.0.11"

## Crypto
secp256k1 = { workspace = true, features = [
    "global-context",
    "rand-std",
    "recovery",
] }

# own dependencies
client = { path = "../btc-server/client" }
reth-btc-wallet = { path = "../../crates/btc-wallet" }
tempfile.workspace = true
tracing.workspace = true
reth-tracing.workspace = true
reth-ecies.workspace = true

## Bitcoin rpc
bitcoincore-rpc = "0.18.0"

# crates.io dependencies
askama = "0.12.1"
port-killer = "0.1.0"
anyhow = "1.0.71"
argh = "0.1.10"
async-trait = "0.1.68"
derive_more = "0.99.17"
displaydoc = "0.2.4"
futures = { version = "0.3.28", features = ["compat", "std"] }
futures-util = "0.3.28"
futures-macro = "0.3.28"
serde = { version = "1.0.164", features = ["derive"] }
serde_json = "1.0.96"
strum = { version = "0.25.0", features = ["derive"] }
strum_macros = "0.25.0"
thiserror = "1.0.40"
tokio = { version = "1.28.2", features = [ "full" ] }
toml = "0.8.0"
uuid = { version = "1.3.3", features = ["serde", "v4"] }
url = "2.3.1"
rand_distr = "0.4.3"
bitcoin = { version = "0.31.0", features = [ "base64", "rand", "serde" ] }
tonic = { version = "0.11.0", features = ["gzip"] }
hex = "0.4.3"
clap = "4.3.3"
ansi_term = "0.12.1"
chrono = { version = "0.4.26", features= ["serde"] }
lazy_static = "1.4.0"
serde_path_to_error = "0.1.11"
bytes = "1.4.0"
num-bigint = "0.4.3"
dotenv = { version = "0.15.0" }
rand = "0.8.5"

[dev-dependencies]
pretty_assertions = "1.3.0"

[features]
default = ["tests"]
tests = []
