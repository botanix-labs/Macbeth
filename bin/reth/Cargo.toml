[package]
name = "reth"
description = "Reth node implementation"
default-run = "reth"
version = "1.0.0"
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

[dependencies]

# crypto
alloy-rlp = { workspace = true }

# misc
aquamarine = { workspace = true }
backon = { workspace = true }

# Bitcoin
bitcoin = { workspace = true }
bitcoincore-rpc = { workspace = true }
bitcoincore-zmq = { workspace = true }
botanix-activation-manager = { workspace = true }
botanix-authority-peg = { workspace = true, features = ["secp256k1"] }
botanix-authority-rsp = { workspace = true }
botanix-bitcoin-checkpoint = { workspace = true }

# Botanix
botanix-btc-wallet = { workspace = true }
botanix-cli-args = { workspace = true }
botanix-cli-parsers = { workspace = true }
botanix-comet-bft-rpc = { workspace = true }
botanix-rpc-config = { workspace = true }
botanix-storage = { workspace = true }
botanix-storage-migrate = { workspace = true }
botanix-utils = { workspace = true }
btc-server = { path = "../btc-server" }
clap = { workspace = true, features = ["derive", "env"] }

# Botanix
client = { path = "../btc-server/client" }

# confy
confy = "0.6"
eyre = { workspace = true }

# io
fdlimit = { workspace = true }

# async
futures = { workspace = true }
# reth
reth-authority-consensus = { workspace = true }
reth-basic-payload-builder = { workspace = true }
reth-beacon-consensus = { workspace = true }
reth-blockchain-tree = { workspace = true }
reth-chainspec = { workspace = true }
reth-cli-commands = { workspace = true }
reth-cli-runner = { workspace = true }
reth-cli-util = { workspace = true }
reth-config = { workspace = true }
reth-consensus = { workspace = true }
reth-consensus-common = { workspace = true }
reth-db = { workspace = true, features = ["mdbx"] }
reth-db-api = { workspace = true }
reth-db-common = { workspace = true }
reth-discv4 = { workspace = true }
reth-downloaders = { workspace = true }
reth-engine-util = { workspace = true }
reth-errors = { workspace = true }
reth-ethereum-payload-builder = { workspace = true }
reth-evm = { workspace = true }
reth-execution-types = { workspace = true }
reth-exex = { workspace = true }
reth-fs-util = { workspace = true }
reth-network = { workspace = true, features = ["serde"] }
reth-network-api = { workspace = true }
reth-network-p2p = { workspace = true }
reth-network-peers = { workspace = true }
reth-node-api = { workspace = true }
reth-node-builder = { workspace = true }
reth-node-core = { workspace = true }
reth-node-ethereum = { workspace = true }
reth-node-events = { workspace = true }
reth-node-metrics = { workspace = true }
reth-payload-builder = { workspace = true }
reth-payload-primitives = { workspace = true }
reth-payload-validator = { workspace = true }
reth-primitives = { workspace = true }
reth-provider = { workspace = true }
reth-prune = { workspace = true }
reth-revm = { workspace = true }
reth-rpc = { workspace = true }
reth-rpc-api = { workspace = true, features = ["client"] }
reth-rpc-builder = { workspace = true }
reth-rpc-engine-api = { workspace = true }
reth-rpc-eth-types = { workspace = true }
reth-rpc-server-types = { workspace = true }
reth-rpc-types = { workspace = true }
reth-rpc-types-compat = { workspace = true }
reth-stages = { workspace = true }
reth-static-file = { workspace = true }
reth-tasks = { workspace = true }
reth-tracing = { workspace = true }
reth-transaction-pool = { workspace = true }
reth-trie = { workspace = true, features = ["metrics"] }
reth-trie-db = { workspace = true, features = ["metrics"] }
rsntp = "3.0.2"
secp256k1 = { workspace = true, features = ["global-context", "rand-std", "recovery", "serde"] }
serde_json = { workspace = true }
similar-asserts = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["sync", "macros", "time", "rt-multi-thread"] }
tokio-stream = { workspace = true }

# tracing
tracing = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
tikv-jemallocator = { version = "0.5.0", optional = true }

[dev-dependencies]
reth-discv4 = { workspace = true }

[features]
asm-keccak = ["reth-node-core/asm-keccak", "reth-primitives/asm-keccak"]
default = ["jemalloc"]
dev = ["reth-cli-commands/dev"]
ethereum = []
jemalloc = ["dep:tikv-jemallocator", "reth-node-core/jemalloc", "reth-node-metrics/jemalloc"]
jemalloc-prof = ["jemalloc", "tikv-jemallocator?/profiling"]
min-debug-logs = ["tracing/release_max_level_debug"]
min-error-logs = ["tracing/release_max_level_error"]
min-info-logs = ["tracing/release_max_level_info"]
min-trace-logs = ["tracing/release_max_level_trace"]
min-warn-logs = ["tracing/release_max_level_warn"]

[[bin]]
name = "reth"
path = "src/main.rs"
