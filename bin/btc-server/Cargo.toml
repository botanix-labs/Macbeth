[package]
name = "btc-server"
version = "0.1.0"
edition = "2021"


[dependencies]
reth-btc-wallet = { path = "../../crates/btc-wallet" }
client = {path = "./client"}

anyhow = "1.0.71"
bitcoin = { version = "0.30.2", features = [ "base64", "rand", "serde" ] }
# TODO update this to the zcash frost library when tr is merged in
frost-secp256k1-tr = { git = "https://github.com/mimoo/frost", branch = "mimoo/fix5",  features = ["serde", "serialization"] }
bdk = "1.0.0-alpha.1" # maybe try remove this dep as it's quite big
ciborium = "0.2.1"
env_logger = "0.10.0"
hex = "0.4.3"
lazy_static = "1.4.0"
log = "0.4.18"
miniscript = "10.0.0"
parking_lot = "0.12.1"
rand = "0.8.5"
serde = "1.0.171"
serde_json = "1.0"
sled = "0.34.7"
thiserror = "1.0.43"

# for tonic
tokio = { version = "1.29.1", features = ["full"] }
tonic = "0.9"
prost = "0.11"
clap = { version = "4.3.22", features = [ "derive" ] }

[build-dependencies]
tonic-build = "0.9"

[dev-dependencies]
tempfile = "3.6.0"
test-log = "0.2.12"
