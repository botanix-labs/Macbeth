[package]
name = "btc-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "btcserverlib"

[dependencies]
actix-cors = "0.7.0"
actix-server = "2.5.0"
actix-web = "4.9.0"
alloy-rpc-types-engine = { version = "0.2.1", default-features = false }
anyhow = "1.0.75"
base64 = "0.22.0"
bdk = "1.0.0-alpha.1"
bitcoin = { version = "0.31.0", features = ["base64", "rand", "serde"] }
bitcoin_hashes = "0.13.0"
bitcoincore-rpc = "0.18.0"
ciborium = "0.2.1"

# clap
clap = { version = "4.3.22", features = ["derive"] }
client = { path = "./client" }
confy = "0.6"
derive_more = { version = "1.0", features = ["full"] }
displaydoc = "0.2"
dotenvy = { version = "0.15.7" }
env_logger = "0.11.3"
frost-secp256k1-tr = { git = "https://github.com/0xBEEFCAF3/frost", branch = "feature/final-additional-tweak", features = [
    "serde",
    "serialization",
] }
futures-util = "0.3.25"
hex = "0.4.3"
lazy_static = "1.4.0"
log = "0.4.18"
miniscript = "11.0.0"
parking_lot = { version = "0.12", features = ["serde"] }
prometheus = { version = "0.13", features = ["process"] }
prost = "0.13.3"
prost-types = "0.13.3"
rand = "0.8.5"

reth-btc-wallet = { path = "../../crates/btc-wallet" }

rust_decimal = { version = "1.13" }
secp256k1 = { version = "0.27.0", features = ["global-context", "rand-std", "recovery"] }
serde = "1.0.171"
serde_json = "1.0"
serde_prometheus = { version = "0.2" }
sled = "0.34.7"
sysinfo = { version = "0.29" }

tempfile = "3.6.0"
thiserror = "1.0.43"

# for tonic
tokio = { version = "1.38.0", features = ["full"] }

#config
toml = "0.8.4"
tonic = { version = "0.12.3", features = ["gzip"] }
tonic-health = { version = "0.12.3" }
tonic-reflection = { version = "0.12.3" }
tracing-actix-web = "0.7.14"
url = "2.5.0"

[build-dependencies]
prost-build = "0.13.3"
tonic-build = "0.12.3"

[dev-dependencies]
test-log = "0.2.12"
