[package]
name = "btc-server"
version = "0.1.0"
edition = "2021"


[dependencies]
reth-btc-wallet = { path = "../../crates/btc-wallet" }
client = {path = "./client"}
bitcoincore-rpc = "0.17.0"

anyhow = "1.0.71"
bitcoin = { version = "0.30.2", features = [ "base64", "rand", "serde" ] }
# TODO update this to the zcash frost library when tr is merged in
frost-secp256k1-tr = { git = "https://github.com/0xBEEFCAF3/frost", branch = "additional-tweaks",  features = ["serde", "serialization"] }


# frost-secp256k1-tr = { version = "1.0.0-rc.0", features = ["serde"], path = "../../../../frost/frost-secp256k1-tr"  }
bdk = "1.0.0-alpha.1" # maybe try remove this dep as it's quite big
ciborium = "0.2.1"
env_logger = "0.11.3"
hex = "0.4.3"
jsonwebtoken = "8"
futures-util = "0.3.25"
secp256k1 = { version = "0.27.0", features = ["global-context", "rand-std", "recovery"] }
lazy_static = "1.4.0"
log = "0.4.18"
miniscript = "10.0.0"
parking_lot = "0.12.1"
rand = "0.8.5"
serde = "1.0.171"
serde_json = "1.0"
sled = "0.34.7"
thiserror = "1.0.43"
displaydoc = "0.2"
toml = "0.8.4"
base64 = "0.22.0"
url = "2.5.0"

# for tonic
tokio = { version = "1.29.1", features = ["full"] }
tonic = { version = "0.11.0", features = ["gzip"] }
tonic-health = { version = "0.11.0" }
tonic-reflection = { version = "0.11.0" }
prost = "0.12.3"

# clap
clap = { version = "4.3.22", features = [ "derive" ] }
serde_cbor = "0.11.2"
bitcoin_hashes = "0.13.0"
rs_merkle = "1.4.2"
sha2 = "0.10.8"

[build-dependencies]
tonic-build = "0.11.0"
prost-build = "0.12.1"

[dev-dependencies]
tempfile = "3.6.0"
test-log = "0.2.12"
