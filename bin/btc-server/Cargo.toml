[package]
name = "btc-server"
version = "1.0.2"
edition = "2021"

[lib]
name = "btcserverlib"

[[bin]]
name = "btc-server"
path = "src/bin/main.rs"

[features]
default = []
conflicting_input = []

[dependencies]
actix-cors = "0.7.0"
actix-server = "2.5.0"
actix-web = "4.9.0"
alloy-rpc-types-engine = { version = "0.2.1", default-features = false }
anyhow = "1.0.75"

async-trait = "0.1.68"
base64 = "0.22.0"
bdk_wallet = "1.0.0"   # just using this for the coin selection

# Bitcoin related dependencies
bitcoin = { version = "0.32.5", features = ["base64", "rand", "serde"] }
bitcoin_hashes = "0.14.0"
bitcoincore-rpc = "0.19.0"
ciborium = "0.2.1"
clap = { version = "4.3.22", features = ["derive"] }
client = { path = "./client" }
confy = "0.6"
derive_more = { version = "1.0", features = ["full"] }
displaydoc = "0.2"
dotenvy = { version = "0.15.7" }
env_logger = "0.11.3"
frost-secp256k1-tr = { git = "https://github.com/0xBEEFCAF3/frost", rev = "b4c5ab017bb0d182f3c56fd80b95d6375a4bfeea", features = [
    "serde",
    "serialization",
] }
futures-util = "0.3.25"
hex = "0.4.3"
lazy_static = "1.4.0"
log = "0.4.18"
miniscript = "12.3.0"
parking_lot = { version = "0.12", features = ["serde"] }
prometheus = { version = "0.13", features = ["process"] }
prost = "0.13.3"
prost-types = "0.13.3"
rand = "0.8.5"

rust_decimal = { version = "1.13" }
serde = "1.0.171"
serde_json = "1.0"
serde_prometheus = { version = "0.2" }
sled = "0.34.7"
sysinfo = { version = "0.29" }

tempfile = "3.6.0"
thiserror = "1.0.43"

# for tonic
tokio = { version = "1.38.0", features = ["full"] }

#config
toml = "0.8.4"
tonic = { version = "0.12.3", features = ["gzip"] }
tonic-health = { version = "0.12.3" }
tonic-reflection = { version = "0.12.3" }
tracing-actix-web = "0.7.14"
url = "2.5.0"

[build-dependencies]
prost-build = "0.13.3"
tonic-build = "0.12.3"

[dev-dependencies]
test-log = "0.2.12"
