[package]
name = "btc-server"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[lib]
name = "btcserverlib"

[[bin]]
name = "btc-server"
path = "src/bin/main.rs"

[[bin]]
name = "sweep"
path = "src/bin/sweep.rs"

[features]
default = []

[dependencies]
actix-cors = "0.7.0"
actix-server = "2.5.0"
actix-web = "4.9.0"

# Bitcoin related dependencies
alloy-primitives = "1.2.0"
anyhow = "1.0.75"
async-stream = "0.3.6"
async-trait = "0.1.68"
base64 = "0.22.0"
bdk_wallet = "1.0.0" # just using this for the coin selection
bitcoin = { version = "0.32.5", features = ["base64", "rand", "serde"] }
bitcoin_hashes = "0.14.0"
bitcoincore-rpc = "0.19.0"
btc-server-client = { path = "./client" }
chacha20poly1305 = "0.10.1"
ciborium = "0.2.1"
clap = { version = "4.3.22", features = ["derive"] }
confy = "0.6"
const_format = { version = "0.2.32", features = ["rust_1_64"] }
derive_more = { version = "1.0", features = ["full"] }
displaydoc = "0.2"
dotenvy = { version = "0.15.7" }
env_logger = "0.11.3"
frost-secp256k1-tr = { git = "https://github.com/botanix-labs/frost", rev = "b4c5ab017bb0d182f3c56fd80b95d6375a4bfeea", features = [
    "serde",
    "serialization",
] }
futures = "0.3"
futures-util = "0.3.25"
hex = "0.4.3"
jsonwebtoken = "9.3.1"
lazy_static = "1.4.0"
log = "0.4.18"

merlin = "3.0.0"
miniscript = "12.3.0"
parking_lot = { version = "0.12.3", features = ["serde"] }
prometheus = { version = "0.14", features = ["process"] }
prost = "0.13.3"
prost-types = "0.13.5"
rand = "0.8.5"

reth-fs-util = { workspace = true }
rust_decimal = { version = "1.13" }
serde = "1.0.171"
serde_json = "1.0"
serde_prometheus = { version = "0.2" }
sled = "0.34.7"
sysinfo = { version = "0.29" }

tempfile = "3.6.0"
thiserror = "2.0.11"

# for tonic
tokio = { version = "1.45.0", features = ["full"] }
tokio-stream = "0.1"

#config
toml = "0.8.4"
tonic = { version = "0.12.3", features = ["gzip"] }
tonic-health = { version = "0.12.3" }
tonic-reflection = { version = "0.12.3" }
tracing-actix-web = "0.7.14"
url = "2.5.0"
zeroize = "1.8.1"

[build-dependencies]
prost-build = "0.13.3"
tonic-build = "0.12.3"
vergen = { version = "8.0.0", features = ["build", "cargo", "git", "gitcl", "rustc"] }

[dev-dependencies]
assert_matches = "1.5.0"
once_cell = "1.21"
test-log = "0.2.17"
