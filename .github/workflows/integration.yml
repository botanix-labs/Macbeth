# Runs integration tests.
name: Botanix Integration Tests

on:
  pull_request:
  merge_group:
  push:
    branches: [main, feature/mark/ci/quick-fix]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIND_NETWORK: regtest
  BITCOIND_URL: http:/localhost:18443
  BITCOIND_COOKIE: /root/.bitcoin/regtest/.cookie
  JWT_DIR: ./jwt

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  e2e:
    name: test / e2e
    runs-on: botanix-actions-runner-vm
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Run e2e tests
        run: |
          cd ./bin/test-suite && \
          /home/runner/.cargo/bin/cargo run --bin test-suite -- \
          --config "./config.toml" \
          --run-suite all \
          --timeout 400000 \
          --dry-run false \
          --jwt-dir "./jwt" \
          --btc-network regtest \
          --bitcoind-url http://localhost:18443 \
          --bitcoind-cookie /root/.bitcoin/regtest/.cookie \
          --min-signers 3 \
          --max-signers 4 && \
          sleep 1

  test:
    name: test / ethereum
    runs-on: botanix-actions-runner-vm
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://localhost:18443 \
          --bitcoind-cookie /root/.bitcoin/regtest/.cookie \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 && \
          sleep 1

      # - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

  sync:
    name: sync / 100k blocks
    # Only run sync tests in merge groups
    runs-on: botanix-actions-runner-vm
    env:
      RUST_LOG: info,sync=error
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      # - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://localhost:18443 \
          --bitcoind-cookie /root/.bitcoin/regtest/.cookie \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 && \
          sleep 1

  integration-success:
    name: integration success
    runs-on: botanix-actions-runner-vm
    if: always()
    needs: [e2e, test, sync]
    timeout-minutes: 60
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}