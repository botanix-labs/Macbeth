# Runs integration tests.
name: Botanix Integration Tests

on:
  pull_request:
  merge_group:
  push:
    branches: [main, feature/mark/ci/quick-fix]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIND_NETWORK: regtest
  BITCOIND_URL: http:/localhost:18443
  BITCOIND_USER: botanix-ci-user
  BITCOIND_PASS: ${{ secrets.BITCOIND_PWD }}
  TEST_JWT_DIR: "/home/ubuntu/actions-runner/_work/Macbeth/Macbeth/bin/test-suite/jwt"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  e2e:
    name: test / e2e
    runs-on: botanix-actions-runner-vm
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - run: /home/runner/.cargo/bin/rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Compile btc-server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo build --bin btc-server && \
          echo "Bitcoin server compiled successfully!"

      - name: Compile poa-node
        run: |
            /home/runner/.cargo/bin/cargo build --bin reth && \
            echo "Poa node compiled successfully!"

      - name: Run e2e tests
        run: |
          cd ./bin/test-suite && \
          /home/runner/.cargo/bin/cargo run --bin test-suite -- \
          --config "./config.toml" \
          --run-suite all \
          --timeout 800000 \
          --dry-run false \
          --jwt-dir ${{env.TEST_JWT_DIR}} \
          --btc-network regtest \
          --bitcoind-url http://localhost:18443 \
          --bitcoind-user botanix-ci-user \
          --bitcoind-pass ${{ env.BITCOIND_PASS }} \
          --min-signers 3 \
          --max-signers 4 & 
          pid=$!
          sleep 300
          echo "e2e tests completed successfully!"

  test:
    name: test / ethereum
    runs-on: botanix-actions-runner-vm
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - run: /home/runner/.cargo/bin/rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://localhost:18443 \
          --bitcoind-user botanix-ci-user \
          --bitcoind-pass ${{ secrets.BITCOIND_PWD }} \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 &
          pid=$! 
          sleep 150
          echo "Killing BTC Server"
          kill -9 $pid


  sync:
    name: sync / 100k blocks
    runs-on: botanix-actions-runner-vm
    env:
      RUST_LOG: info,sync=error
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - run: /home/runner/.cargo/bin/rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://localhost:18443 \
          --bitcoind-user botanix-ci-user \
          --bitcoind-pass ${{ secrets.BITCOIND_PWD }} \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 &
          pid=$! 
          sleep 150
          echo "Killing BTC Server"
          kill -9 $pid

  integration-success:
    name: integration success
    runs-on: botanix-actions-runner-vm
    if: always()
    needs: [e2e, test, sync]
    timeout-minutes: 60
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          allowed-failures: sync
          jobs: ${{ toJSON(needs) }}