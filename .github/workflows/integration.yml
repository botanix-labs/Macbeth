# Runs integration tests.
name: Botanix Integration Tests

on:
  pull_request:
  merge_group:
    branches: [main, feature/poA-consensus]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIND_NETWORK: regtest
  BITCOIND_URL: http:/localhost:18443
  BITCOIND_USER: botanix-ci-user
  BITCOIND_PASS: ${{ secrets.BITCOIND_PWD }}
  TEST_JWT_DIR: "/home/runner/actions-runner/_work/Macbeth/Macbeth/bin/test-suite/jwt"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: test / e2e
    runs-on: botanix-actions-runner-vm-1
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          toolchain: stable

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true
          env-vars: |
            CARGO_HOME="/home/runner/.cargo"

      - name: Compile btc-server
        run: |
          cd ./bin/btc-server && \
          cargo build --bin btc-server && \
          echo "Bitcoin server compiled successfully!"

      - name: Compile poa-node
        run: |
          cargo build --bin reth && \
          echo "Poa node compiled successfully!"

      - name: Run e2e tests
        run: |
          cd ./bin/test-suite && \
          cargo run --bin test-suite -- \
          --config "./config.toml" \
          --run-suite all \
          --timeout 800000 \
          --dry-run false \
          --jwt-dir ${{env.TEST_JWT_DIR}} \
          --btc-network ${{env.BITCOIND_NETWORK}} \
          --bitcoind-url ${{env.BITCOIND_URL}} \
          --bitcoind-user ${{env.BITCOIND_USER}} \
          --bitcoind-pass ${{ env.BITCOIND_PASS }} \
          --min-signers 3 \
          --max-signers 4 & 
          sleep 600
          echo "e2e tests completed successfully!"


  sync:
    name: sync / 100k blocks
    runs-on: botanix-actions-runner-vm-1
    env:
      RUST_LOG: info,sync=error
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - run: /home/runner/.cargo/bin/rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network ${{env.BITCOIND_NETWORK}} \
          --bitcoind-url ${{env.BITCOIND_URL}} \
          --bitcoind-user ${{env.BITCOIND_USER}} \
          --bitcoind-pass ${{ env.BITCOIND_PASS }} \
          --fall-back-fee-rate-sat-per-vbyte 5 &
          pid=$! 
          sleep 150
          echo "Killing BTC Server"
          kill -9 $pid
