# Runs integration tests.
name: Botanix Integration Tests

on:
  pull_request:
  merge_group:
    branches:
      - develop
      - hotfix
  push:
    branches:
      - main
      - develop
      - hotfix

permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  JWT_DIR: "/home/runner/actions-runner/_work/Macbeth/Macbeth/bin/test-suite/jwt"
  # sccache configuration
  RUSTC_WRAPPER: "sccache"
  SCCACHE_GCS_RW_MODE: "READ_WRITE"
  SCCACHE_GCS_BUCKET: "macbeth-sccache-bucket"
  SCCACHE_ERROR_LOG: "/tmp/sccache_log.txt"
  SCCACHE_LOG: "warn"
  GCP_PROJECT_ID: botanix-391913
  SCCACHE_GCS_KEY_PATH: "/tmp/gcs-key.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: build test binaries
    runs-on: k8-runners
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, cargo
          toolchain: stable

      - name: Install dependencies
        run: |
          bash .github/scripts/deps.sh

      - name: Configure cache mode for forks
        run: |
          if [ "${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "Skipping GCP auth/GCS cache for forked PR."
          else
            echo "SCCACHE_GHA_ENABLED=false" >> $GITHUB_ENV
          fi

      # Detect presence of auth inputs
      - name: Detect auth inputs
        id: gate
        env:
          WIP: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA:  ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GKE: ${{ secrets.GKE_WORKLOAD_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "$WIP" && -n "$SA" ]]; then echo "has_gcp=true" >>"$GITHUB_OUTPUT"; else echo "has_gcp=false" >>"$GITHUB_OUTPUT"; fi
          if [[ -n "$GKE" ]]; then echo "has_gke_key=true" >>"$GITHUB_OUTPUT"; else echo "has_gke_key=false" >>"$GITHUB_OUTPUT"; fi

      - name: gcloud auth
        if: ${{ steps.gate.outputs.has_gcp == 'true' }}
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: gcloud setup
        if: ${{ steps.gate.outputs.has_gcp == 'true' }}
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 'Create GCS credentials file for sccache'
        if: ${{ steps.gate.outputs.has_gke_key == 'true' }}
        run: |
          echo '${{ secrets.GKE_WORKLOAD_KEY }}' > ${SCCACHE_GCS_KEY_PATH}
          chmod 600 ${SCCACHE_GCS_KEY_PATH}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          sccache --start-server
          sccache --show-stats

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true
          env-vars: |
            RUSTC_WRAPPER

      - name: Compile btc-server
        run: |
          set -eo pipefail
          cd ./bin/btc-server 
          cargo build --bin btc-server 
          echo "Bitcoin server compiled successfully!"
          sccache --show-stats

      - name: Compile btc-utils
        run: |
          set -eo pipefail
          cd ./bin/btc-server 
          cargo build --bin btc-utils
          echo "BTC utils compiled successfully!"
          sccache --show-stats

      - name: Compile poa-node
        run: |
          set -eo pipefail
          cargo build --bin reth 
          echo "Poa node compiled successfully!"
          sccache --show-stats

      - name: Compile test-suite
        run: | 
          set -eo pipefail
          cd ./bin/test-suite
          cargo build --bin test-suite
          echo "Test suite compiled successfully!"
          sccache --show-stats

      - name: Compile pegin-recovery
        run: |
          set -eo pipefail
          cd ./bin/pegin-recovery
          cargo build --bin pegin-recovery
          echo "Pegin recovery compiled successfully!"
          sccache --show-stats

      - name: Prepare binaries for upload
        run: |
          set -euo pipefail
          OUT="${CARGO_TARGET_DIR:-$GITHUB_WORKSPACE/target}"
          echo "Using target dir: $OUT"
          ls -lah "$OUT/debug" || true
      
          mkdir -p /tmp/binaries
          for bin in btc-server reth test-suite pegin-recovery btc-utils; do
            if [ -f "$OUT/debug/$bin" ]; then
              cp "$OUT/debug/$bin" /tmp/binaries/
              echo "copied $bin"
            else
              echo "$bin not found in $OUT/debug"
            fi
          done
      
          [ "$(ls -A /tmp/binaries 2>/dev/null || echo)" ] || {
            echo "No binaries found in $OUT/debug"; exit 1; }

      - name: Upload compiled binaries
        uses: actions/upload-artifact@v5
        with:
          name: compiled-binaries
          path: /tmp/binaries
          retention-days: 1


  e2e-tests:
    name: test / ${{ matrix.test }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false  # Continue running other tests even if one fails
      matrix:
        test: ["dkg_flow",
          "utxo_commitment",
          "signing_flow",
          "test_mempool_gossip",
          "utxo_sync",
          "utxo_recovery",
          "state_sync",
          "wallet_sync",
          "frost_e2e_stable",
          "test_pegin_v1",
          "invalid_pegin",
          "invalid_pegout",
          "block_builder",
          "test_prevent_resigning_pegout",
          "test_round1_then_new_signing_session",
          "test_track_mempool",
          "tx_weight_limit",
          "test_pegin_recovery",
          "rpc_node"]
    env:
      RUST_BACKTRACE: 1
      TEST_TO_RUN: ${{ matrix.test }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          bash .github/scripts/deps.sh

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install killall
        run: sudo apt-get install psmisc
        
      - name: Configure cache mode for forks
        run: |
          if [ "${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "Skipping GCP auth/GCS cache for forked PR."
          else
            echo "SCCACHE_GHA_ENABLED=false" >> $GITHUB_ENV
          fi

      - name: Detect auth inputs
        id: gate
        env:
          WIP: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA:  ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GKE: ${{ secrets.GKE_WORKLOAD_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "$WIP" && -n "$SA" ]]; then echo "has_gcp=true" >>"$GITHUB_OUTPUT"; else echo "has_gcp=false" >>"$GITHUB_OUTPUT"; fi
          if [[ -n "$GKE" ]]; then echo "has_gke_key=true" >>"$GITHUB_OUTPUT"; else echo "has_gke_key=false" >>"$GITHUB_OUTPUT"; fi
          
      - name: gcloud auth
        if: ${{ steps.gate.outputs.has_gcp == 'true' }}
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: 'Create GCS credentials file for sccache'
        if: ${{ steps.gate.outputs.has_gke_key == 'true' }}
        run: |
          echo '${{ secrets.GKE_WORKLOAD_KEY }}' > ${SCCACHE_GCS_KEY_PATH}
          chmod 600 ${SCCACHE_GCS_KEY_PATH}

      - name: Download compiled binaries
        uses: actions/download-artifact@v6
        with:
          name: compiled-binaries
          path: /tmp/binaries

      - name: Setup binaries
        run: |
          mkdir -p target/debug
          mkdir -p ./bin/test-suite
          
          if [ -f "/tmp/binaries/btc-server" ]; then
            cp /tmp/binaries/btc-server target/debug/ 
            chmod +x target/debug/btc-server
          fi

          if [ -f "/tmp/binaries/btc-utils" ]; then
            cp /tmp/binaries/btc-utils target/debug/
            chmod +x target/debug/btc-utils
          fi
          
          if [ -f "/tmp/binaries/reth" ]; then
            cp /tmp/binaries/reth target/debug/
            chmod +x target/debug/reth
          fi

          if [ -f "/tmp/binaries/test-suite" ]; then
            sudo cp /tmp/binaries/test-suite /usr/local/bin/
            sudo chmod +x /usr/local/bin/test-suite
          fi

          if [ -f "/tmp/binaries/pegin-recovery" ]; then
            cp /tmp/binaries/pegin-recovery target/debug/
            chmod +x target/debug/pegin-recovery
          fi
          
          if [ -d "/tmp/binaries/test-suite-dir" ]; then
            cp -r /tmp/binaries/test-suite-dir/* ./bin/test-suite/
          fi

      - name: Run ${{ matrix.test }}
        run: |
          make start-test-suite-runners
          

      - name: Cleanup resources
        if: always()
        run: |
          killall btc-server || true
          killall bitcoind || true

  # Final job to report overall status
  integration-summary:
    name: integration summary
    runs-on: ubuntu-latest
    if: always()
    needs: [e2e-tests]
    timeout-minutes: 15
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

      - name: Generate test report
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests completed with status: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Cache Performance" >> $GITHUB_STEP_SUMMARY
          echo "Parallel execution with sccache was used to optimize build times." >> $GITHUB_STEP_SUMMARY

