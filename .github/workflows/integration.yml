# Runs integration tests.

name: Botanix Integration Tests

on:
  pull_request:
  merge_group:
  push:
    branches: [main, feature/mark/ci/quick-fix]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIN_NETWORK: regtest
  BITCOIND_URL: http://botanix-bitcoind-ci.sre.svc.cluster.local:18443
  BITCOIND_COOKIE: foo

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ethereum
    runs-on: botanix-actions-runner
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      # Needed for BTC server
      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://botanix-bitcoind-ci.sre.svc.cluster.local:18443 \
          --bitcoind-cookie /etc/bitcoin/.cookie \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5

      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run tests
        run: |
          cargo nextest run \
            --locked --features "ethereum" \
            --workspace --exclude examples --exclude ef-tests \
            -E 'kind(test)'

  sync:
    name: sync / 100k blocks
    # Only run sync tests in merge groups
    # if: github.event_name == 'merge_group'
    # runs-on:
    runs-on: botanix-actions-runner
      # group: Reth
    env:
      RUST_LOG: info,sync=error
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://botanix-bitcoind-ci.sre.svc.cluster.local:18443 \
          --bitcoind-cookie /etc/bitcoin/.cookie \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5
      - name: Run sync
        run: |
          cargo run --release --features jemalloc,min-error-logs --bin reth \
            -- node \
            --debug.tip 0x91c90676cab257a59cd956d7cb0bceb9b1a71d79755c23c7277a0697ccfaf8c4 \
            --debug.max-block 100000 \
            --debug.terminate
      - name: Verify the target block hash
        run: |
          cargo run --release --bin reth \
            -- db \
            get CanonicalHeaders 100000 \
            | grep 0x91c90676cab257a59cd956d7cb0bceb9b1a71d79755c23c7277a0697ccfaf8c4

  integration-success:
    name: integration success
    runs-on: botanix-actions-runner
    if: always()
    needs: [test]
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}