# Runs integration tests.
name: Botanix Integration Tests

on:
  pull_request:
  merge_group:
    branches: [main, feature/poA-consensus]
  push:
    branches: [feature/poA-consensus]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIND_NETWORK: regtest
  BITCOIND_URL: http:/localhost:18443
  BITCOIND_USER: botanix-ci-user
  BITCOIND_PASS: ${{ secrets.BITCOIND_PWD }}
  TEST_JWT_DIR: "/home/ubuntu/actions-runner/_work/Macbeth/Macbeth/bin/test-suite/jwt"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: test / e2e
    runs-on: botanix-actions-runner-vm-1
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - run: /home/runner/.cargo/bin/rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true
          env-vars: |
            CARGO_HOME="/home/runner/.cargo"

      - name: Compile btc-server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo build --bin btc-server && \
          echo "Bitcoin server compiled successfully!"

      - name: Compile poa-node
        run: |
          /home/runner/.cargo/bin/cargo build --bin reth && \
          echo "Poa node compiled successfully!"

      - name: Run e2e tests
        run: |
          cd ./bin/test-suite && \
          /home/runner/.cargo/bin/cargo run --bin test-suite -- \
          --config "./config.toml" \
          --run-suite all \
          --timeout 800000 \
          --dry-run false \
          --jwt-dir ${{env.TEST_JWT_DIR}} \
          --btc-network ${{env.BITCOIND_NETWORK}} \
          --bitcoind-url ${{env.BITCOIND_URL}} \
          --bitcoind-user ${{env.BITCOIND_USER}} \
          --bitcoind-pass ${{ env.BITCOIND_PASS }} \
          --min-signers 3 \
          --max-signers 4 

          if [ $? -eq 0 ]; then
            echo "e2e tests completed successfully, exiting..."
            exit 0
          else
            echo "Btc-server did not run successfully."
            exit 1
          fi

