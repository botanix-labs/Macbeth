# Runs integration tests.
name: Botanix Integration Tests

on:
  pull_request:
  merge_group:
  push:
    branches: [main, feature/mark/ci/quick-fix]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIN_NETWORK: regtest
  BITCOIND_URL: http://botanix-bitcoind-ci.sre.svc.cluster.local:18443
  BITCOIND_COOKIE: /etc/bitcoin/.cookie

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ethereum
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://botanix-bitcoind-ci.sre.svc.cluster.local:18443 \
          --bitcoind-cookie /etc/bitcoin/.cookie \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 &

      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

  sync:
    name: sync / 100k blocks
    # Only run sync tests in merge groups
    runs-on: ubuntu-latest
    env:
      RUST_LOG: info,sync=error
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://botanix-bitcoind-ci.sre.svc.cluster.local:18443 \
          --bitcoind-cookie /etc/bitcoin/.cookie \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 &


  integration-success:
    name: integration success
    runs-on: ubuntu-latest
    if: always()
    needs: [test]
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}