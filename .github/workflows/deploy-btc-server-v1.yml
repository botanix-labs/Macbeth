name: Build, Tag, and Deploy Docker BTC Server v1 Image to GCP

on:
  pull_request:
    branches:
      - feature/poA-consensus
    types: [closed]
  push:
    branches:
      - feature/mark/ci/quick-fix

jobs:
  build_and_deploy:
    runs-on: botanix-actions-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      # NOTE: this operation should be replaced by a cloud or someother form of HSM once software is mainnet ready
      # key.template.hex does not exist in the repo, it is a placeholder for the actual key
    #   - name: Copy key hex
    #     run: cp bin/btc-server/key.template.hex bin/btc-server/key.hex

      - name: Build Docker image
        run: |
          docker build -t botanix_testnet_btc_server_v1 -f Dockerfile.btc_server .
        working-directory: ./

      - name: Tag Docker image
        run: |
          cat /etc/gcp/sa_credentials.json | docker login -u _json_key --password-stdin https://us-central1-docker.pkg.dev
          docker tag botanix_testnet_btc_server_v1:latest us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-btc-server-v1/botanix-btc-server-v1:latest

      - name: Push Docker image to Google Container Registry
        run: |
          docker push us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-btc-server-v1/botanix-btc-server-v1:latest


