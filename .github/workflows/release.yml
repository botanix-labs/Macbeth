  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    strategy:
      matrix:
        configs:
          - bin: btc-server
            package: btc-server
          - bin: reth
            package: reth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Auth gcloud
        uses: google-github-actions/auth@v2
        with:
          project_id: botanix-391913
          workload_identity_provider: projects/1091390741689/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@botanix-391913.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: botanix-391913

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: generate-tags
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          MAJOR="${{ needs.semantic-release.outputs.new_release_major_version }}"
          MINOR="${{ needs.semantic-release.outputs.new_release_minor_version }}"
          CHANNEL="${{ needs.semantic-release.outputs.new_release_channel }}"

          # Determine Docker tags based on release channel
          case "$CHANNEL" in
            "latest") 
              DOCKER_TAGS="latest,$VERSION"
              if [ -n "$MAJOR" ] && [ -n "$MINOR" ]; then
                DOCKER_TAGS="$DOCKER_TAGS,$MAJOR.$MINOR"
              fi
              if [ -n "$MAJOR" ]; then
                DOCKER_TAGS="$DOCKER_TAGS,$MAJOR"
              fi
              ;;
            *) DOCKER_TAGS="$CHANNEL,$VERSION" ;;
          esac

          # Generate fully qualified tags
          BTC_SERVER_TAGS=""
          RETH_NODE_TAGS=""

          for tag in $(echo "$DOCKER_TAGS" | tr ',' ' '); do
            # Skip empty tags
            if [ -n "$tag" ]; then
              if [ -z "$BTC_SERVER_TAGS" ]; then
                BTC_SERVER_TAGS="ghcr.io/botanix-labs/botanix-btc-server:$tag"
                RETH_NODE_TAGS="ghcr.io/botanix-labs/botanix-reth-node:$tag"
              else
                BTC_SERVER_TAGS="$BTC_SERVER_TAGS,ghcr.io/botanix-labs/botanix-btc-server:$tag"
                RETH_NODE_TAGS="$RETH_NODE_TAGS,ghcr.io/botanix-labs/botanix-reth-node:$tag"
              fi
            fi
          done

          echo "btc-server-tags=$BTC_SERVER_TAGS" >> $GITHUB_OUTPUT
          echo "reth-node-tags=$RETH_NODE_TAGS" >> $GITHUB_OUTPUT

      # TODO: Download artifacts with Cargo.toml. # why do we need to do this?
      - name: Build Docker Image
        if: matrix.configs.bin == 'btc-server'
        run: |
          docker build \
            --platform linux/amd64 \
            -t botanix_btc_server \
            -f Dockerfile \
            --build-arg PACKAGE=btc-server \
            --build-arg BIN=btc-server \
            .

      - name: Build Reth Docker Image
        if: matrix.configs.bin == 'reth'
        run: |
          docker build \
            --platform linux/amd64 \
            -t botanix_reth_node \
            -f Dockerfile \
            --build-arg PACKAGE=reth \
            --build-arg BIN=reth \
            .

      - name: Tag Docker Image
        if: matrix.configs.bin == 'btc-server'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.btc-server-tags }}"
          for tag in "${TAGS[@]}"; do
            docker tag botanix_btc_server:latest "$tag"
          done

      - name: Tag Docker Image
        if: matrix.configs.bin == 'reth'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.reth-node-tags }}"
          for tag in "${TAGS[@]}"; do
            docker tag botanix_reth_node:latest "$tag"
          done

      - name: Push Docker Image
        if: matrix.configs.bin == 'btc-server'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.btc-server-tags }}"
          for tag in "${TAGS[@]}"; do
            docker push "$tag"
          done

      - name: Push Docker Image
        if: matrix.configs.bin == 'reth'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.reth-node-tags }}"
          for tag in "${TAGS[@]}"; do
            docker push "$tag"
          done


  # This job waits for the binary release workflow to complete before finalizing the release
  finalize-release:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs:
      - semantic-release
      - build-docker-images
      - build-binaries
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO: Download artifacts with Cargo.toml

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: List Available Artifacts
        run: |
          find ./binaries -type f | sort

      - name: Prepare Artifacts for GitHub Release
        run: |
          mkdir -p ./release-assets
          version=${{ needs.semantic-release.outputs.new_release_version }}

          # Copy artifacts to the release-assets directory with proper naming
          find ./binaries -type f \( -name "*.tar.gz" -o -name "*.sha256sum" \) | while read file; do
            cp "$file" ./release-assets/
          done

      # TODO: Download artifacts with Cargo.toml and Cargo.lock

      - name: Push version update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): bump version to ${{ needs.semantic-release.outputs.new_release_version }}"
          git push origin HEAD --tags

      - name: Back-merge to other branches
        if: github.ref_name == 'main'
        run: |
          echo "Performing back-merge from main to develop, rc, and hotfix branches"
          git fetch origin
          ./.github/scripts/release.sh multi_back_merge main "${{ secrets.GITHUB_TOKEN }}" develop rc hotfix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          tag_name: v${{ needs.semantic-release.outputs.new_release_version }}
          name: Botanix Release v${{ needs.semantic-release.outputs.new_release_version }}
          body: ${{ needs.semantic-release.outputs.new_release_notes }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: ${{ needs.semantic-release.outputs.new_release_channel == 'latest' }}
          prerelease: ${{ needs.semantic-release.outputs.new_release_channel != 'latest' }}

  publish-release:
    name: Publish to Botanix Releases Repository
    runs-on: ubuntu-latest
    needs:
      - semantic-release
      - finalize-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Public Repository
        uses: actions/checkout@v4
        with:
          repository: botanix-labs/botanix-releases  # Replace with your public repo
          token: ${{ secrets.PAT_TOKEN }}
          path: botanix
          fetch-depth: 0

      - name: Setup Git for Public Repo
        run: |
          cd botanix
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Publish Release
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
            ./.github/scripts/publish-release.sh full-publish \
              "${{ needs.semantic-release.outputs.new_release_version }}" \
              "${{ needs.semantic-release.outputs.new_release_channel }}" \
              "${{ needs.semantic-release.outputs.new_release_notes }}" \
              "${{ needs.semantic-release.outputs.new_release_git_tag }}" \
              "${{ needs.semantic-release.outputs.new_release_git_head }}" \
              "${{ needs.semantic-release.outputs.last_release_version }}"
