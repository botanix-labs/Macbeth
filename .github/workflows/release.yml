  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    strategy:
      matrix:
        configs:
          - bin: btc-server
            package: btc-server
          - bin: reth
            package: reth
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Auth gcloud
        uses: google-github-actions/auth@v3
        with:
          project_id: botanix-391913
          workload_identity_provider: projects/1091390741689/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@botanix-391913.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: botanix-391913

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: generate-tags
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          MAJOR="${{ needs.semantic-release.outputs.new_release_major_version }}"
          MINOR="${{ needs.semantic-release.outputs.new_release_minor_version }}"
          CHANNEL="${{ needs.semantic-release.outputs.new_release_channel }}"

          # Determine Docker tags based on release channel
          case "$CHANNEL" in
            "latest") 
              DOCKER_TAGS="latest,$VERSION"
              if [ -n "$MAJOR" ] && [ -n "$MINOR" ]; then
                DOCKER_TAGS="$DOCKER_TAGS,$MAJOR.$MINOR"
              fi
              if [ -n "$MAJOR" ]; then
                DOCKER_TAGS="$DOCKER_TAGS,$MAJOR"
              fi
              ;;
            *) DOCKER_TAGS="$CHANNEL,$VERSION" ;;
          esac

          # Generate fully qualified tags
          BTC_SERVER_TAGS=""
          RETH_NODE_TAGS=""

          for tag in $(echo "$DOCKER_TAGS" | tr ',' ' '); do
            # Skip empty tags
            if [ -n "$tag" ]; then
              if [ -z "$BTC_SERVER_TAGS" ]; then
                BTC_SERVER_TAGS="ghcr.io/botanix-labs/botanix-btc-server:$tag"
                RETH_NODE_TAGS="ghcr.io/botanix-labs/botanix-reth-node:$tag"
              else
                BTC_SERVER_TAGS="$BTC_SERVER_TAGS,ghcr.io/botanix-labs/botanix-btc-server:$tag"
                RETH_NODE_TAGS="$RETH_NODE_TAGS,ghcr.io/botanix-labs/botanix-reth-node:$tag"
              fi
            fi
          done

          echo "btc-server-tags=$BTC_SERVER_TAGS" >> $GITHUB_OUTPUT
          echo "reth-node-tags=$RETH_NODE_TAGS" >> $GITHUB_OUTPUT

      - name: Download Cargo files
        uses: actions/download-artifact@v6
        with:
          name: cargo-files
          path: .
      - name: Build Docker Image
        if: matrix.configs.bin == 'btc-server'
        run: |
          docker build \
            --platform linux/amd64 \
            -t botanix_btc_server:latest \
            -f Dockerfile \
            --build-arg BIN=btc-server \
            .

      - name: Build Reth Docker Image
        if: matrix.configs.bin == 'reth'
        run: |
          docker build \
            --platform linux/amd64 \
            -t botanix_reth_node:latest \
            -f Dockerfile \
            --build-arg BIN=reth \
            .

      - name: Tag Docker Image
        if: matrix.configs.bin == 'btc-server'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.btc-server-tags }}"
          for tag in "${TAGS[@]}"; do
            docker tag botanix_btc_server:latest "$tag"
          done

      - name: Tag Docker Image
        if: matrix.configs.bin == 'reth'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.reth-node-tags }}"
          for tag in "${TAGS[@]}"; do
            docker tag botanix_reth_node:latest "$tag"
          done

      - name: Push Docker Image
        if: matrix.configs.bin == 'btc-server'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.btc-server-tags }}"
          for tag in "${TAGS[@]}"; do
            docker push "$tag"
          done

      - name: Push Docker Image
        if: matrix.configs.bin == 'reth'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.generate-tags.outputs.reth-node-tags }}"
          for tag in "${TAGS[@]}"; do
            docker push "$tag"
          done


  # This job waits for the binary release workflow to complete before finalizing the release
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - semantic-release
      - build-binaries
      - build-docker-images
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Download Release Artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./binaries

      - name: List Available Artifacts
        run: |
          find ./binaries -type f | sort

      - name: Prepare Artifacts for GitHub Release
        run: |
          mkdir -p ./release-assets
          version=${{ needs.semantic-release.outputs.new_release_version }}

          # Copy artifacts to the release-assets directory with proper naming
          find ./binaries -type f \( -name "*.tar.gz" -o -name "*.sha256sum" \) | while read file; do
            cp "$file" ./release-assets/
          done

      - name: Download Cargo files
        uses: actions/download-artifact@v6
        with:
          name: cargo-files
          path: .

      - name: Commit Cargo files
        run: ./.github/scripts/release.sh commit_cargo_files "${{ needs.semantic-release.outputs.new_release_version }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install NPM dependencies
        run: pnpm install

      - name: Publish semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branches: ${{ needs.semantic-release.outputs.branches_config }}

      - name: Push Cargo files
        run: git push origin HEAD

  publish-public-github-release:
    name: Publish to Botanix Releases Repository
    runs-on: ubuntu-latest
    needs:
      - semantic-release
      - publish-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Public Repository
        uses: actions/checkout@v6
        with:
          repository: botanix-labs/botanix-releases  # Replace with your public repo
          token: ${{ secrets.PAT_TOKEN }}
          path: botanix
          fetch-depth: 0

      - name: Setup Git for Public Repo
        run: |
          cd botanix
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download Release Artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./artifacts

      - name: Publish Release
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ./.github/scripts/publish-release.sh full-publish \
            "${{ needs.semantic-release.outputs.new_release_version }}" \
            "${{ needs.semantic-release.outputs.new_release_channel }}" \
            "${{ needs.semantic-release.outputs.new_release_notes }}" \
            "${{ needs.semantic-release.outputs.new_release_git_tag }}" \
            "${{ needs.semantic-release.outputs.new_release_git_head }}" \
            "${{ needs.semantic-release.outputs.last_release_version }}"

  back-merge:
    name: Back-merge Main Branch
    runs-on: ubuntu-latest
    needs:
      - semantic-release
      - publish-release
    if: github.ref_name == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Back-merge to other branches
        run: |
          ./.github/scripts/release.sh back_merge main develop "${{ secrets.PAT_TOKEN }}" "${{ needs.semantic-release.outputs.new_release_version }}"
          ./.github/scripts/release.sh back_merge main rc "${{ secrets.PAT_TOKEN }}" "${{ needs.semantic-release.outputs.new_release_version }}"
          ./.github/scripts/release.sh back_merge main hotfix "${{ secrets.PAT_TOKEN }}" "${{ needs.semantic-release.outputs.new_release_version }}"
