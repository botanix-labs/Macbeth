name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - rc
      - hotfix

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write
  actions: write

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      # Whether a new release was published
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      # Version of the new release
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      # Major version of the new release
      new_release_major_version: ${{ steps.semantic.outputs.new_release_major_version }}
      # Minor version of the new release'
      new_release_minor_version: ${{ steps.semantic.outputs.new_release_minor_version }}
      # Patch version of the new release'
      new_release_patch_version: ${{ steps.semantic.outputs.new_release_patch_version }}
      # The distribution channel on which the last release was initially made available (undefined for the default distribution channel)
      new_release_channel: ${{ steps.semantic.outputs.new_release_channel }}
      # The release notes for the new release.
      new_release_notes: ${{ steps.semantic.outputs.new_release_notes }}
      # The sha of the last commit being part of the new release.
      new_release_git_head: ${{ steps.semantic.outputs.new_release_git_head }}
      # The Git tag associated with the new release.
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      # Version of the previous release, if there was one.
      last_release_version: ${{ steps.semantic.outputs.last_release_version }}
      # The sha of the last commit being part of the last release, if there was one.
      last_release_git_head: ${{ steps.semantic.outputs.last_release_git_head }}
      # The Git tag associated with the last release, if there was one.
      last_release_git_tag: ${{ steps.semantic.outputs.last_release_git_tag }}
      # Branches configuration for manual dispatch
      branches_config: ${{ steps.branches_config.outputs.branches }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare branches configuration for manual dispatch
        id: branches_config
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Check if .releaserc exists
          if [ ! -f ".releaserc" ]; then
            echo "::error::No .releaserc file found. Please create a .releaserc file to define branch configurations."
            exit 1
          fi

          # Read existing branches configuration from .releaserc
          EXISTING_BRANCHES=$(yq eval '.branches' .releaserc -o=json)

          # Check if current branch already exists in configuration
          BRANCH_EXISTS=$(echo "$EXISTING_BRANCHES" | jq -r --arg branch "$GITHUB_REF_NAME" '.[] | select(.name == $branch) | .name')

          if [ ! -n "$BRANCH_EXISTS" ]; then
            # Branch not found, add current branch to existing configuration
            if [ "$GITHUB_REF_NAME" = "develop" ]; then
              # Special case for develop branch - use alpha channel
              CHANNEL="alpha"
              PRERELEASE="alpha"
            else
              # Use sanitized branch name as channel
              CHANNEL=${GITHUB_REF_NAME//[^a-z0-9]/}
              PRERELEASE="$CHANNEL"
            fi

            # Create new branch configuration
            NEW_BRANCH_CONFIG=$(echo "$EXISTING_BRANCHES" | jq --arg name "$GITHUB_REF_NAME" --arg channel "$CHANNEL" --arg prerelease "$PRERELEASE" '. + [{name: $name, channel: $channel, prerelease: $prerelease}]')

            echo "branches<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_BRANCH_CONFIG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "Added branch $GITHUB_REF_NAME with channel $CHANNEL to existing configuration"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install NPM dependencies
        run: pnpm install

      - name: Determine semantic version
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branches: ${{ steps.branches_config.outputs.branches }}
          dry_run: true

      - name: Fail if no release is published
        if: steps.semantic.outputs.new_release_published == 'false'
        run: |
          echo "::error::No appropriate commits to release. Skip release workflow."
          exit 1

      - name: Update Cargo.toml version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: ./.github/scripts/release.sh update_cargo_version "${{ steps.semantic.outputs.new_release_version}}"

      - name: Upload Cargo.toml and Cargo.lock to artifacts
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: cargo-files
          path: |
            Cargo.toml
            Cargo.lock
          retention-days: 1

  build-binaries:
    name: Build Binaries
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: binary-builder
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        configs:
          - target: x86_64-unknown-linux-gnu
            profile: maxperf
          - target: aarch64-unknown-linux-gnu
            profile: maxperf
        build:
          - command: build
            binary: reth
          - command: build-btc-server
            binary: btc-server
    env:
      # sccache configuration
      RUSTC_WRAPPER: "sccache"
      SCCACHE_GHA_ENABLED: "false"  # Disable GitHub Actions cache in favor of GCS
      SCCACHE_GCS_RW_MODE: "READ_WRITE"
      SCCACHE_GCS_BUCKET: "macbeth-sccache-bucket"
      SCCACHE_ERROR_LOG: "/tmp/sccache_log.txt"
      SCCACHE_LOG: "warn"
      GCP_PROJECT_ID: botanix-391913
      SCCACHE_GCS_KEY_PATH: "/tmp/gcs-key.json"

    steps:
      - uses: actions/checkout@v6
      - uses: rui314/setup-mold@v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.configs.target }}
          toolchain: stable

      - name: gcloud auth
        uses: google-github-actions/auth@v3
        with:
          project_id: botanix-391913
          workload_identity_provider: projects/1091390741689/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@botanix-391913.iam.gserviceaccount.com

      - name: gcloud setup
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 'Create GCS credentials file for sccache'
        run: |
          echo '${{ secrets.GKE_WORKLOAD_KEY }}' > ${SCCACHE_GCS_KEY_PATH}
          chmod 600 ${SCCACHE_GCS_KEY_PATH}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          sccache --start-server
          sccache --show-stats

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true
          env-vars: |
            RUSTC_WRAPPER

      - name: Install cross main
        id: cross_main
        run: |
          cargo install cross --git https://github.com/cross-rs/cross


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Reth Binary
        if: matrix.build.binary == 'reth'
        run: |
          export CARGO_BUILD_JOBS=2
          unset CARGO_TARGET_DIR 
          make PROFILE=${{ matrix.configs.profile }} build-${{ matrix.configs.target }}

      - name: Build Bitcoin Server Binary
        if: matrix.build.binary == 'btc-server'
        run: |
          unset CARGO_TARGET_DIR 
          cross build --package btc-server --bin btc-server --target ${{ matrix.configs.target }} --release

      - name: Move Binary to Artifacts
        run: |
          mkdir -p artifacts
          [[ "${{ matrix.configs.target }}" == *windows* ]] && ext=".exe"
          
          echo "Looking for binaries in target/${{ matrix.configs.target }}/"
          find target/${{ matrix.configs.target }}/ -name "*${{ matrix.build.binary }}*" -type f || echo "No binaries found"
          
          if [[ "${{ matrix.build.binary }}" == "reth" && "${{ matrix.configs.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            mv "target/${{ matrix.configs.target }}/${{ matrix.configs.profile }}/reth${ext}" ./artifacts/
          elif [[ "${{ matrix.build.binary }}" == "btc-server" && "${{ matrix.configs.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            mv "target/${{ matrix.configs.target }}/release/btc-server${ext}" ./artifacts/
          elif [[ "${{ matrix.build.binary }}" == "reth" && "${{ matrix.configs.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            mv "target/${{ matrix.configs.target }}/${{ matrix.configs.profile }}/reth${ext}" ./artifacts/
          elif [[ "${{ matrix.build.binary }}" == "btc-server" && "${{ matrix.configs.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            mv "target/${{ matrix.configs.target }}/release/btc-server${ext}" ./artifacts/
          fi
          export CARGO_TARGET_DIR=/home/runner


      - name: Download Cargo files
        uses: actions/download-artifact@v6
        with:
          name: cargo-files
          path: .

      - name: Create sha256sum
        run: |
          cd artifacts
          echo "Artifacts: ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz"
          tar -czf ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz ${{ matrix.build.binary }}*
          sha256sum ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz > ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz.sha256sum
          mv ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz.sha256sum ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz
          path: ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz

      - name: Upload Signature
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz.sha256sum
          path: ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz.sha256sum

      - name: Upload Binary to GCP Artifact Storage
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          CHANNEL="${{ needs.semantic-release.outputs.new_release_channel }}"
          
          # Map channel names
          case "$CHANNEL" in
            "latest") CHANNEL="stable" ;;
          esac
          
          echo "Uploading $VERSION to channel: $CHANNEL"
          
          # Upload to specific channel directory
          gcloud storage cp ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz.sha256sum gs://botanix-artifact-registry/releases/${{ matrix.build.binary }}/${CHANNEL}/${VERSION}/
          gcloud storage cp ${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz gs://botanix-artifact-registry/releases/${{ matrix.build.binary }}/${CHANNEL}/${VERSION}/
          
          # Set Content-Type and Cache-Control headers
          gsutil setmeta -h "Cache-Control:public, max-age=3600" gs://botanix-artifact-registry/releases/${{ matrix.build.binary }}/${CHANNEL}/${VERSION}/${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz.sha256sum
          gsutil setmeta -h "Cache-Control:public, max-age=3600" gs://botanix-artifact-registry/releases/${{ matrix.build.binary }}/${CHANNEL}/${VERSION}/${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz
          
          echo "Binary uploaded to:"
          echo "https://storage.googleapis.com/botanix-artifact-registry/releases/${{ matrix.build.binary }}/${CHANNEL}/${VERSION}/${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz"
          echo "https://storage.googleapis.com/botanix-artifact-registry/releases/${{ matrix.build.binary }}/${CHANNEL}/${VERSION}/${{ matrix.build.binary }}-${{ matrix.configs.target }}.tar.gz.sha256sum"


