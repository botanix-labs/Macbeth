name: "Mint Contract Check"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  contract-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Build contract 
        working-directory: ./contracts
        run: forge build --sizes

      - name: Add build summary
        working-directory: ./contracts
        run: |
          echo "## Build result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

  contract-test:
    needs: ["contract-build"]
    runs-on: "ubuntu-latest"
    env:
      MINTING_CONTRACT_ADDRESS: "0x0Ea320990B44236A0cEd0ecC0Fd2b2df33071e78"
    steps:
      - name: "Check out the repo"
        uses: "actions/checkout@v4"

      - name: "Install Foundry"
        uses: "foundry-rs/foundry-toolchain@v1"

      - name: "Install Bun"
        uses: "oven-sh/setup-bun@v1"


      - name: "Show the Foundry config"
        working-directory: "./contracts"
        run: "forge config"

      - name: "Generate a fuzz seed that changes weekly to avoid burning through RPC allowance"
        working-directory: "./contracts"
        run: >
          echo "FOUNDRY_FUZZ_SEED=$(
            echo $(($EPOCHSECONDS - $EPOCHSECONDS % 604800))
          )" >> $GITHUB_ENV

      - name: "Run the mint tests"
        working-directory: "./contracts"
        run: |
            forge test --match-contract Minting -vvv

      - name: "Run the faucet tests"
        working-directory: "./contracts"
        run: |
            forge test --match-contract Faucet -vvv

      - name: "Add test summary"
        working-directory: "./contracts"
        run: |
          echo "## Tests result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

  eBurger-contract-analysis-check:
    needs: ["contract-test"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
      
      - name: Run eburger contract analysis
        id: eburger-contract-analysis
        uses: forefy/eburger-action@main
        with:
          path: ./contracts
          output_type: json

      - name: Create/update checklist as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          REPORT: ${{ steps.eburger-contract-analysis.outputs.json }}
        with:
          github-token: ${{ secrets.ANALYSIS_TOKEN }}
          script: |
            const script = require('.github/scripts/comment')
            const header = '# eBurger report'
            const body = process.env.REPORT
            await script({ github, context, header, body })

      # - name: Upload Sarif file
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: ${{ steps.eburger-contract-analysis.outputs.sarif }}

  slither-contract-analysis-check:
    needs: ["contract-test"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
      
      - name: Run slither contract analysis
        id: slither-contract-analysis
        uses: crytic/slither-action@v0.4.0
        with: 
          target: ./contracts
          sarif: results.sarif
          fail-on: none
          slither-args: --checklist --markdown-root ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/
      
      # - name: Upload Sarif file
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: ${{ steps.slither-contract-analysis.outputs.sarif }}

      - name: Create/update checklist as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          REPORT: ${{ steps.slither-contract-analysis.outputs.stdout }}
        with:
          github-token: ${{ secrets.ANALYSIS_TOKEN }}
          script: |
            const script = require('.github/scripts/comment')
            const header = '# Slither report'
            const body = process.env.REPORT
            await script({ github, context, header, body })



