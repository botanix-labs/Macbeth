  #         run_install: true

  #     - name: Install Protobuf Compiler
  #       run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

  #     - name: Lint project
  #       run: make lint

  codespell:
    name: Codespell
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: codespell-project/actions-codespell@v2
        with:
          skip: "*.json"

  grafana:
    name: Grafana dashboard JSON validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Check dashboard JSON with jq
        uses: sergeysova/jq-action@v2
        with:
          cmd: jq empty etc/grafana/dashboards/overview.json

  signed-commits:
    name: Signed commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commits are signed
        uses: 1Password/check-signed-commits-action@v1

  lint-success:
    name: All green
    runs-on: ubuntu-latest
    if: always()
    needs:
      - clippy
      - crate-checks
      - lockfile
      - fmt
      - rust-fmt
      - codespell
      - grafana
      - signed-commits
      # - cargo-verifications
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
