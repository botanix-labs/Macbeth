name: Lints

on:
  pull_request:
    types:
      - opened
      - synchronize
      - edited
      - reopened
  merge_group:
    branches:
      - develop
      - hotfix
  push:
    branches:
      - main
      - develop
      - hotfix

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  CI: true

