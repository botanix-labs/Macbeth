name: lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - edited
      - reopened
  merge_group:
    branches:
      - main
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  CI: true

