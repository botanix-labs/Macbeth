name: Botanixlabs Semantic Release

on:
  workflow_dispatch:
    inputs:
      force_branch:
        description: 'Branch to force release from (default is current branch)'
        required: false
        default: ''
  push:
    branches:
      - main
      - develop
      - rc
      - hotfix

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write
  actions: write

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install -g semantic-release @semantic-release/github @semantic-release/exec @semantic-release/release-notes-generator @semantic-release/commit-analyzer conventional-changelog-conventionalcommits semantic-release-docker semantic-release-gcr

      - name: Setup Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: gcloud auth
        id: 'auth'
        uses: google-github-actions/auth@v2
        with:
          project_id: botanix-391913
          workload_identity_provider: projects/1091390741689/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@botanix-391913.iam.gserviceaccount.com

      - name: gcloud setup
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: botanix-391913

      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_OVERRIDE: ${{ github.event.inputs.force_branch }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ -n "$BRANCH_OVERRIDE" ]; then
            echo "Running release on branch: $BRANCH_OVERRIDE"
            npx semantic-release --branches $BRANCH_OVERRIDE
          else
            echo "Running release on current branch"
            npx semantic-release
          fi

  # This job waits for the binary release workflow to complete before finalizing the release
  finalize-release:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: List Available Artifacts
        run: |
          find ./binaries -type f | sort

      - name: Prepare Artifacts for GitHub Release
        run: |
          mkdir -p ./release-assets
          version=${{ needs.semantic-release.outputs.new_release_version }}
          
          # Copy artifacts to the release-assets directory with proper naming
          for file in $(find ./binaries -name "*.tar.gz" -o -name "*.sha256sum"); do
            cp "$file" ./release-assets/
          done

      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          tag_name: v${{ needs.semantic-release.outputs.new_release_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: |
            ${{ 
              github.ref == 'refs/heads/develop' || 
              github.ref == 'refs/heads/rc' || 
              github.ref == 'refs/heads/hotfix' 
            }}
