# Run unit tests
name: Botanix Unit Tests

on:
  pull_request:
  merge_group:
    branches:
      - main
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIND_NETWORK: regtest
  BITCOIND_URL: http:/localhost:18443
  BITCOIND_USER: botanix-ci-user
  BITCOIND_PASS: ${{ secrets.BITCOIND_PWD }}
  TEST_JWT_DIR: "/home/runner/actions-runner/_work/Macbeth/Macbeth/bin/test-suite/jwt"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ethereum
    runs-on: k8-test
    env:
      RUST_BACKTRACE: 1
      CARGO_HOME: /home/runner/.cargo
      CARGO_TARGET_DIR: /home/runner/target
      CARGO_NET_OFFLINE: "true"
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          toolchain: stable

      - name: Install nextest
        uses: taiki-e/install-action@nextest
          
      - name: Ensure registry is up to date
        if: steps.rust-cache.outputs.cache-hit != 'true'
        run: cargo fetch

      - name: Run tests
        run: |
          cargo nextest run \
            --locked --features "ethereum" \
            --workspace --exclude example-custom-evm --exclude example-stateful-precompile --exclude ef-tests \
            -E "kind(lib) | kind(bin) | kind(proc-macro)"
  
  # Commented out till we fix the test harness
  # state:
  #   name: Ethereum state tests
  #   runs-on:
  #     group: macbeth
  #   env:
  #     RUST_LOG: info,sync=error
  #     RUST_BACKTRACE: 1
  #   timeout-minutes: 60
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Checkout ethereum/tests
  #       uses: actions/checkout@v4
  #       with:
  #         repository: ethereum/tests
  #         ref: 1c23e3c27ac53b794de0844d2d5e19cd2495b9d8
  #         path: testing/ef-tests/ethereum-tests
  #         submodules: recursive
  #         fetch-depth: 1
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: taiki-e/install-action@nextest
  #     - uses: Swatinem/rust-cache@v2
  #       with:
  #         cache-on-failure: true
  #     - run: cargo nextest run --release -p ef-tests --features "asm-keccak ef-tests"

  doc:
    name: doc tests (ethereum)
    runs-on: k8-test
    env:
      RUST_BACKTRACE: 1
      CARGO_HOME: /home/runner/.cargo
      CARGO_TARGET_DIR: /home/runner/target
      CARGO_NET_OFFLINE: "true"
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Run doctests
        run: cargo test --doc --workspace --features "ethereum"

  unit-success:
    name: unit success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - doc
    timeout-minutes: 90
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
