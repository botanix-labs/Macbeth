name: Botanix Unit Tests

on:
  pull_request:
  merge_group:
  push:
    branches: [main, feature/mark/ci/quick-fix]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ethereum (${{ matrix.partition }}/2)
    runs-on: botanix-actions-runner
    env:
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        partition: [1, 2]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - uses: taiki-e/install-action@nextest

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://botanix-bitcoind-ci.sre.svc.cluster.local:18443  \
          --bitcoind-user botanix-ci-user \
          --bitcoind-pass ${{ secrets.BITCOIND_PWD }} \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 &

      - name: Run tests
        run: |
          cargo nextest run \
            --locked --features "ethereum" \
            --workspace --exclude examples --exclude ef-tests \
            --partition hash:${{ matrix.partition }}/2 \
            -E "kind(lib) | kind(bin) | kind(proc-macro)"

  state:
    name: Ethereum state tests
    runs-on: botanix-actions-runner
    env:
      RUST_LOG: info,sync=error
      RUST_BACKTRACE: 1
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ethereum/tests
        uses: actions/checkout@v4
        with:
          repository: ethereum/tests
          path: testing/ef-tests/ethereum-tests
          submodules: recursive
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network regtest \
          --bitcoind-url http://botanix-bitcoind-ci.sre.svc.cluster.local:18443 \
          --bitcoind-user botanix-ci-user \
          --bitcoind-pass ${{ secrets.BITCOIND_PWD }} \
          --jwt-secret "bin/btc-server/jwt.hex" \
          --fall-back-fee-rate-sat-per-vbyte 5 &

      - run: cargo nextest run --release -p ef-tests --features ef-tests

  doc:
    name: doc tests (ethereum)
    runs-on: botanix-actions-runner
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Run doctests
        run: cargo test --doc --workspace --features "ethereum"

  unit-success:
    name: unit success
    runs-on: botanix-actions-runner
    if: always()
    needs: [test, state, doc]
    timeout-minutes: 90
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
