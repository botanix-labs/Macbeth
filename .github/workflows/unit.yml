# Run unit tests
name: Botanix Unit Tests

on:
  pull_request:
  merge_group:
    branches: [main, feature/poA-consensus]
  push:
    branches: [feature/poA-consensus]

env:
  CARGO_TERM_COLOR: always
  SEED: rustethereumethereumrust
  BITCOIND_NETWORK: regtest
  BITCOIND_URL: http:/localhost:18443
  BITCOIND_USER: botanix-ci-user
  BITCOIND_PASS: ${{ secrets.BITCOIND_PWD }}
  TEST_JWT_DIR: "/home/ubuntu/actions-runner/_work/Macbeth/Macbeth/bin/test-suite/jwt"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ethereum
    runs-on: 
      group: botanix-actions-runner
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true
      - uses: taiki-e/install-action@nextest

      - name: Run tests
        run: |
          cargo nextest run \
            --locked --features "ethereum" \
            --workspace --exclude examples --exclude ef-tests \
            -E "kind(lib) | kind(bin) | kind(proc-macro)"

  state:
    name: Ethereum state tests
    runs-on: botanix-actions-runner-vm-1
    env:
      RUST_LOG: info,sync=error
      RUST_BACKTRACE: 1
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ethereum/tests
        uses: actions/checkout@v4
        with:
          repository: ethereum/tests
          path: testing/ef-tests/ethereum-tests
          submodules: recursive
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Start BTC Server
        run: |
          cd ./bin/btc-server && \
          /home/runner/.cargo/bin/cargo run --bin btc-server -- \
          --identifier 0 \
          --address 0.0.0.0:8080 \
          --db "./db1" \
          --min-signers 2 \
          --max-signers 2 \
          --toml ./config.toml \
          --fee-rate-diff-percentage 30 \
          --btc-network ${{env.BITCOIND_NETWORK}} \
          --bitcoind-url ${{env.BITCOIND_URL}} \
          --bitcoind-user ${{env.BITCOIND_USER}} \
          --bitcoind-pass ${{ env.BITCOIND_PASS }} \
          --fall-back-fee-rate-sat-per-vbyte 5 &&

          if [ $? -eq 0 ]; then
            echo "Btc-server ran successfully, exiting..."
            exit 0
          else
            echo "Btc-server did not run successfully."
            exit 1
          fi

      - run: cargo nextest run --release -p ef-tests --features ef-tests

  doc:
    name: doc tests (ethereum)
    runs-on: 
      group: botanix-actions-runner-vm-1
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Run doctests
        run: cargo test --doc --workspace --features "ethereum"

  unit-success:
    name: unit success
    runs-on: ubuntu-latest
    if: always()
    needs: [test, state, doc]
    timeout-minutes: 90
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
