name: Build, Tag, and Deploy Botanix Testnet v1

on:
  pull_request:
    branches:
      - feature/poA-consensus
    types: [closed]
    
jobs:
  build_and_deploy_btc_server:
    runs-on: botanix-actions-runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      - name: Build Docker image
        run: |
          docker build -t botanix_testnet_btc_server_v1 -f Dockerfile.btc_server .
        working-directory: ./

      - name: Tag Docker image
        run: |
          cat /etc/gcp/sa_credentials.json | docker login -u _json_key --password-stdin https://us-central1-docker.pkg.dev
          docker tag botanix_testnet_btc_server_v1:latest us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-btc-server-v1/botanix-btc-server-v1:latest

      - name: Push Docker image to Google Container Registry
        run: |
          docker push us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-btc-server-v1/botanix-btc-server-v1:latest

  build_and_deploy_poa_node:
    runs-on: botanix-actions-runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 -t botanix_testnet_v1 -f Dockerfile .
        working-directory: ./

      - name: Tag Docker image
        run: |
          cat /etc/gcp/sa_credentials.json | docker login -u _json_key --password-stdin https://us-central1-docker.pkg.dev
          docker tag botanix_testnet_v1:latest us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-node-v1/botanix-poa-node:latest

      - name: Push Docker image to Google Container Registry
        run: |
          docker push us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-node-v1/botanix-poa-node:latest
  
  deploy_testnet_to_gke:
    runs-on: botanix-actions-runner
    needs: [build_and_deploy_btc_server, build_and_deploy_poa_node]
    if: ${{ (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true) }}
    env:
      PROJECT_ID: botanix-391913
      CLUSTER_NAME: botanixlabs-cluster-dev
      ZONE: us-central1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up gcloud cli
        uses: google-github-actions/setup-gcloud@1bee7de035d65ec5da40a31f8589e240eba8fde5
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure docker
        run: gcloud --quiet auth configure-docker
        
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GKE_WORKLOAD_KEY }}'
    
      - id: 'get-credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.ZONE }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Kustomize
        run: |-
          curl -sfLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/v3.1.0/kustomize_3.1.0_linux_amd64
          chmod u+x ./kustomize
          sudo mv ./kustomize /usr/local/bin/kustomize

      - name: Set up Helm
        run: |-
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Deploy to GKE
        working-directory: ./k8s/botanix-testnet-v1
        run: make deploy
        
    