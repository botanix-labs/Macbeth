name: Docker Build Test for PoA Node

on:
  pull_request:
    branches: 
      - feature/poA-consensus
    types: [opened, closed]

jobs:
  build_poa_node:
    runs-on: botanix-actions-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      - name: Install cargo cross compile
        run: cargo install cross

      - name: Build Multi-arch Docker image
        run: |
          make docker-build-push
        working-directory: ./



