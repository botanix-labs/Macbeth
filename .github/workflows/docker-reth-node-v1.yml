name: Docker Build Test for PoA Node

on:
  pull_request:
    branches:
      - develop
      - hotfix
    types: [opened]

jobs:
  build_poa_node:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t botanix_testnet_v1 \
            -f Dockerfile \
            --build-arg PACKAGE=reth \
            --build-arg BIN=reth \
            .
          docker tag botanix_testnet_v1:latest us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-v1/botanix-poa-node:${{ steps.sha.outputs.short_sha }}
        working-directory: ./




