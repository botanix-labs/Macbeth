name: Build, Tag, and Deploy Docker BTC Server Image to GCP

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      - name: Log in to Google Container Registry
        run: |
          echo ${{ secrets.GCR_SERVICE_ACCOUNT_KEY }} | docker login -u _json_key_base64 --password-stdin https://us-central1-docker.pkg.dev
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCR_SERVICE_ACCOUNT_KEY }}

      # NOTE: this operation should be replaced by a cloud or someother form of HSM once software is mainnet ready
      - name: Copy key hex
        run: cp bin/btc-server/key.template.hex bin/btc-server/key.hex

      - name: Build Docker image
        run: |
          docker build -t botanix_testnet_btc_server -f Dockerfile.btc_server .
        working-directory: ./

      - name: Tag Docker image
        run: |
          docker tag botanix_testnet_btc_server:latest us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-btc-server/botanix_testnet_btc_server:latest

      - name: Push Docker image to Google Container Registry
        run: |
          docker push us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-btc-server/botanix_testnet_btc_server:latest

  push_to_gke:
    runs-on: ubuntu-latest
    needs: build_and_deploy
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main'  || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true) }}
    env:
      PROJECT_ID: botanix-391913
      CLUSTER_NAME: botanixlabs-cluster-dev
      ZONE: us-central1-a
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up gcloud cli
        uses: google-github-actions/setup-gcloud@1bee7de035d65ec5da40a31f8589e240eba8fde5
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure docker
        run: gcloud --quiet auth configure-docker
      
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GKE_WORKLOAD_KEY }}'
  
      - id: 'get-credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: 'botanixlabs-cluster-dev'
          location: 'us-central1'
          project_id: 'botanix-391913'

      - name: Set up Kustomize
        run: |-
          curl -sfLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/v3.1.0/kustomize_3.1.0_linux_amd64
          chmod u+x ./kustomize
          sudo mv ./kustomize /usr/local/bin/kustomize

      - name: Deploy to GKE
        working-directory: ./k8s/btc-server
        run: make deploy
