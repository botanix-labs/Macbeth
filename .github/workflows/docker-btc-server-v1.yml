name: Docker Build Test for BTC Server

on:
  pull_request:
    branches:
      - develop
      - hotfix
    types: [opened]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t botanix_testnet_btc_server_v1 \
            -f Dockerfile \
            --build-arg PACKAGE=btc-server \
            --build-arg BIN=btc-server \
            .
          docker tag botanix_testnet_btc_server_v1:latest us-central1-docker.pkg.dev/botanix-391913/botanix-testnet-btc-server-v1/botanix-btc-server-v1:${{ steps.sha.outputs.short_sha }}
        working-directory: ./



