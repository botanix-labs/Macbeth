name: Docker Build Test for BTC Server

on:
  pull_request:
    branches:
      - main
    types: [opened]

jobs:
  build_and_deploy:
    runs-on: botanix-actions-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      - name: Build Docker image
        run: |
          docker build -t botanix_testnet_btc_server_v1 -f Dockerfile.btc_server .
        working-directory: ./



