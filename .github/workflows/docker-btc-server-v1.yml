name: Docker Build Test for BTC Server

on:
  pull_request:
    branches:
      - main
    types: [opened, closed]

jobs:
  build_and_deploy:
    runs-on: image-builder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 -t botanix_testnet_btc_server_v1 -f Dockerfile.btc_server .
        working-directory: ./



