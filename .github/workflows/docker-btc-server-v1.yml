name: Docker Build Test for BTC Server

on:
  pull_request:
    branches:
      - main
    types: [opened]

jobs:
  build_and_deploy:
    runs-on: botanix-actions-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3.6.1

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64,linux/arm64,linux/arm/v7 -t botanix_testnet_btc_server_v1 -f Dockerfile.btc_server .
        working-directory: ./

