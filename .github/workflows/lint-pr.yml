name: "Lint PR"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  title:
    name: PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  base-branch:
    name: Base branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branches
        run: |
          if [ "$GITHUB_HEAD_REF" = "main" ]; then
            echo "Pull requests to main branch are not allowed. Base branch must be either `develop` or `hotfix`."
            exit 1
          fi
